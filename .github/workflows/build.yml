name: Build

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  generated-artifact:
    name: Generated artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check generated HTML
        run: npm run build:check

      - name: Check build script syntax
        run: node --check tools/build-single-file.mjs

      - name: Check source script syntax
        run: find src/scripts -name '*.js' -print0 | xargs -0 -n1 node --check
