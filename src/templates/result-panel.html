        <template id="result-panel-template">
            <div class="result-panel">
                <div class="result-chrome">
                    <details class="result-summary">
                        <summary class="result-summary-toggle" title="Query details">
                            <span class="result-summary-marker">▸</span>
                            <span class="result-summary-title">Query details</span>
                            <span class="result-stats"></span>
                            <span class="result-output-actions">
                                <button type="button" class="result-download result-action-button shadow" title="Download result" aria-label="Download result">
                                    <svg class="download-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                        <polyline points="7 10 12 15 17 10"></polyline>
                                        <line x1="12" y1="15" x2="12" y2="3"></line>
                                    </svg>
                                </button>
                                <button type="button" class="result-copy result-action-button shadow" title="Copy formatted result" aria-label="Copy formatted result">⧉</button>
                            </span>
                        </summary>
                        <div class="result-query-details-actions">
                            <button type="button" class="result-query-copy result-action-button shadow" title="Copy query" aria-label="Copy query">Copy query</button>
                        </div>
                        <pre class="result-query monospace"></pre>
                    </details>
                </div>
                <div class="result-body">
                    <div class="data-div">
                        <table class="monospace shadow data-table"></table>
                        <pre class="monospace shadow data-unparsed"></pre>
                    </div>
                    <div class="chart-output"></div>
                    <svg class="graph-output" fill="none"></svg>
                    <p class="error-output monospace shadow"></p>
                </div>
            </div>
        </template>
