        openConnectionMenu(connection, rect);
    });

    actions.appendChild(expand_all_button);
    actions.appendChild(collapse_all_button);
    header.appendChild(toggle);
    header.appendChild(button);
    if (current_badge) {
        header.appendChild(current_badge);
    }
    header.appendChild(actions);
    header.appendChild(menu_button);
    connection_node.appendChild(header);

    const children = document.createElement('div');
    children.className = 'navigator-connection-children';

    if (expanded && connection.id == current_connection_id) {
        if (schema_state.loading && schema_state.connection_id == connection.id) {
            children.appendChild(createNavigatorStatus('Loading schema...'));
        } else if (schema_state.connection_id == connection.id && schema_state.databases.length) {
            const visible_databases = schema_state.databases.filter(database_info =>
                matchesSchemaFilter(database_info.database, filter));

            for (const database_info of visible_databases) {
                let database = document.createElement('div');
                database.className = 'database';
                const database_expanded = filter
                    ? true
                    : isDatabaseExpanded(connection.id, database_info.database);
                if (!database_expanded) {
                    database.classList.add('collapsed');
                }

                let database_header = document.createElement('div');
                database_header.className = 'database-header';
                database_header.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    openDatabaseMenu({ left: e.clientX, bottom: e.clientY }, database_info.database);
                });

                let database_toggle = document.createElement('button');
                database_toggle.type = 'button';
                database_toggle.className = 'navigator-toggle';
                database_toggle.innerText = database_expanded ? '▾' : '▸';

                let database_link = document.createElement('button');
                database_link.type = 'button';
                database_link.className = 'database-button';
                database_link.title = 'Click to expand. Right-click for actions';
                if (database_info.current) database_link.classList.add('current');
                database_link.appendChild(createNavigatorLabel('🛢️', database_info.database, 'database'));

                const database_actions = document.createElement('div');
                database_actions.className = 'navigator-header-actions';

                const expand_database_button = document.createElement('button');
                expand_database_button.type = 'button';
                expand_database_button.className = 'navigator-header-action';
                expand_database_button.innerText = '+';
                expand_database_button.title = 'Expand all tables and views in this database';

                const collapse_database_button = document.createElement('button');
                collapse_database_button.type = 'button';
                collapse_database_button.className = 'navigator-header-action';
                collapse_database_button.innerText = '−';
                collapse_database_button.title = 'Collapse all tables and views in this database';

                const toggle_database_tables = async expanded => {
                    let database_rows = schema_state.tables[database_info.database];
                    if (!database_rows && !schema_state.loading_tables[database_info.database]) {
                        database_rows = await loadTables(connection.url, connection.user, connection.password, database_info.database);
                    }
                    if (!database_rows || database_rows === false) {
                        return;
                    }

                    setTablesExpanded(connection.id, database_info.database, database_rows.map(row => row.table), expanded);
                    renderNavigatorTree();
                };

                expand_database_button.addEventListener('click', async e => {
                    e.stopPropagation();
                    await toggle_database_tables(true);
                });
                collapse_database_button.addEventListener('click', async e => {
                    e.stopPropagation();
                    await toggle_database_tables(false);
                });

                database_actions.appendChild(expand_database_button);
                database_actions.appendChild(collapse_database_button);

                let tables = document.createElement('div');
                tables.className = 'tables';

                database_header.appendChild(database_toggle);
                database_header.appendChild(database_link);
                database_header.appendChild(database_actions);
                database.appendChild(database_header);
                database.appendChild(tables);
                children.appendChild(database);

                const toggle_database = () => {
                    const next_expanded = !isDatabaseExpanded(connection.id, database_info.database);
                    setDatabaseExpanded(connection.id, database_info.database, next_expanded);
                    renderNavigatorTree();
                    if (next_expanded
                        && !schema_state.tables[database_info.database]
                        && !schema_state.loading_tables[database_info.database]) {
                        loadTables(connection.url, connection.user, connection.password, database_info.database);
                    }
                };

                database_toggle.addEventListener('click', e => {
                    e.stopPropagation();
                    toggle_database();
                });
                database_link.addEventListener('click', e => {
                    e.stopPropagation();
                    toggle_database();
                });

                if (database_expanded) {
                    if (schema_state.loading_tables[database_info.database]) {
                        tables.appendChild(createNavigatorStatus('Loading tables...'));
                    } else if (schema_state.table_messages[database_info.database]) {
                        tables.appendChild(createNavigatorStatus(schema_state.table_messages[database_info.database]));
                    } else if (schema_state.tables[database_info.database]) {
                        renderTableGroups(connection.id, connection.url, connection.user, connection.password, database_info.database, tables, schema_state.tables[database_info.database]);
                    } else {
                        tables.appendChild(createNavigatorStatus('Loading tables...'));
                        loadTables(connection.url, connection.user, connection.password, database_info.database);
                    }
                }
            }
            if (!visible_databases.length) {
                children.appendChild(createNavigatorStatus('No databases matched the current filter.'));
            }
        } else if (schema_state.message) {
            children.appendChild(createNavigatorStatus(schema_state.message));
        }
    } else if (expanded) {
        children.appendChild(createNavigatorStatusAction('click to load schema', () => {
            setConnectionExpanded(connection.id, true);
            applyConnection(connection);
        }));
    }

    connection_node.appendChild(children);
    return connection_node;
}

function createConnectionFolderNavigatorNode(folder, connections, filter) {
    const folder_connections = connections.filter(connection => connection.folder_id == folder.id);
    const folder_matches = filter && folder.name.toLowerCase().includes(filter);
    const visible_connection_nodes = [];

    for (const connection of folder_connections) {
        const node = createConnectionNavigatorNode(connection, folder_matches ? '' : filter);
        if (node) {
            visible_connection_nodes.push(node);
        }
    }

    if (filter && !folder_matches && !visible_connection_nodes.length) {
        return null;
    }

    const folder_node = document.createElement('div');
    folder_node.className = 'navigator-folder';
    const expanded = filter ? true : folder.expanded !== false;
    if (!expanded) {
        folder_node.classList.add('collapsed');
    }

    const header = document.createElement('div');
    header.className = 'navigator-folder-header';
    header.addEventListener('contextmenu', e => {
        e.preventDefault();
        openConnectionFolderMenu(folder, { left: e.clientX, bottom: e.clientY });
    });

    const toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'navigator-toggle';
    toggle.innerText = expanded ? '▾' : '▸';
    toggle.addEventListener('click', e => {
        e.stopPropagation();
        setConnectionFolderExpanded(folder.id, !expanded);
        renderNavigatorTree();
    });

    const title = document.createElement('button');
    title.type = 'button';
    title.className = 'navigator-folder-title';
    title.innerText = folder.name;
    title.title = folder.name;
    title.addEventListener('click', () => {
        setConnectionFolderExpanded(folder.id, !expanded);
        renderNavigatorTree();
    });

    const actions = document.createElement('div');
    actions.className = 'navigator-folder-actions';

    const menu_button = document.createElement('button');
    menu_button.type = 'button';
    menu_button.className = 'navigator-folder-action';
    menu_button.innerText = '⋮';
    menu_button.title = 'Folder actions';
    menu_button.addEventListener('click', e => {
        e.stopPropagation();
        openConnectionFolderMenu(folder, menu_button.getBoundingClientRect());
    });
    actions.appendChild(menu_button);

    header.appendChild(toggle);
    header.appendChild(title);
    header.appendChild(actions);
    folder_node.appendChild(header);

    const children = document.createElement('div');
    children.className = 'navigator-folder-children';
    if (visible_connection_nodes.length) {
        for (const node of visible_connection_nodes) {
            children.appendChild(node);
        }
    } else {
        children.appendChild(createNavigatorStatus('No connections in this folder.'));
    }
    folder_node.appendChild(children);
    return folder_node;
}

function renderNavigatorTree() {
    const store = getSavedConnectionStore();
    const connections = store.connections;
    const folders = store.folders;
    const filter = schema_filter_elem.value.trim().toLowerCase();
    hideNavigatorContextMenu();
    schema_browser_elem.innerHTML = '';
    updateNavigatorActions();

    if (!connections.length && !folders.length) {
        schema_browser_empty_elem.style.display = 'block';
        schema_browser_empty_elem.innerText = 'No saved connections.';
        return;
    }

    for (const connection of connections.filter(connection => !(connection.folder_id || ''))) {
        const node = createConnectionNavigatorNode(connection, filter);
        if (node) {
            schema_browser_elem.appendChild(node);
        }
    }

    for (const folder of folders) {
        const node = createConnectionFolderNavigatorNode(folder, connections, filter);
        if (node) {
            schema_browser_elem.appendChild(node);
        }
    }

    schema_browser_empty_elem.style.display = schema_browser_elem.firstChild ? 'none' : 'block';
    if (!schema_browser_elem.firstChild) {
        schema_browser_empty_elem.innerText = 'No navigator items matched the current filter.';
    }
}

function renderTableGroups(connection_id, server_address, user, password, database, tables_elem, table_rows) {
    while (tables_elem.firstChild) tables_elem.removeChild(tables_elem.firstChild);

    const filter = schema_filter_elem.value.trim().toLowerCase();

    const sorted_rows = [...table_rows].sort((a, b) => a.table.localeCompare(b.table, undefined, { numeric: true }));
    const groups = [
        { name: 'Tables', kind: 'table', rows: sorted_rows.filter(elem => getSchemaItemKind(elem.engine) == 'table') },
        { name: 'Dictionaries', kind: 'dictionary', rows: sorted_rows.filter(elem => getSchemaItemKind(elem.engine) == 'dictionary') },
        { name: 'Materialized Views', kind: 'materialized-view', rows: sorted_rows.filter(elem => getSchemaItemKind(elem.engine) == 'materialized-view') },
        { name: 'Views', kind: 'view', rows: sorted_rows.filter(elem => getSchemaItemKind(elem.engine) == 'view') }
    ];

    for (const group of groups) {
        const filtered_tables = group.rows.filter(elem => !filter || `${database}.${elem.table}`.toLowerCase().includes(filter));
        if (!filtered_tables.length) {
            continue;
        }

        let group_elem = document.createElement('div');
        group_elem.className = 'schema-group';

        const group_expanded = filter ? true : isSchemaGroupExpanded(connection_id, database, group.name);
        if (!group_expanded) {
            group_elem.classList.add('collapsed');
        }

        let group_title = document.createElement('div');
        group_title.className = 'schema-group-title';
        const group_toggle = document.createElement('span');
        group_toggle.className = 'schema-group-toggle';
        group_toggle.innerText = group_expanded ? '▾' : '▸';

        const group_label = createNavigatorLabel(getSchemaItemIcon(group.kind), group.name, group.kind);
        const group_count = document.createElement('span');
        group_count.className = 'schema-group-count';
        group_count.innerText = String(filtered_tables.length);

        group_title.appendChild(group_toggle);
        group_title.appendChild(group_label);
        group_title.addEventListener('click', () => {
            setSchemaGroupExpanded(connection_id, database, group.name, !group_expanded);
            renderNavigatorTree();
        });
        group_title.appendChild(group_count);
        group_elem.appendChild(group_title);

        const group_items = document.createElement('div');
        group_items.className = 'schema-group-items';

        for (let elem of filtered_tables) {
            let table = document.createElement('div');
            table.className = 'table';
            const item_kind = getSchemaItemKind(elem.engine);

            let table_row = document.createElement('div');
            table_row.className = 'table-row';
            table_row.addEventListener('contextmenu', e => {
                e.preventDefault();
                openTableMenu({ left: e.clientX, bottom: e.clientY }, server_address, user, password, database, elem.table, elem.engine);
            });

            let toggle = document.createElement('button');
            toggle.type = 'button';
            toggle.className = 'table-toggle';
            const table_expanded = isTableExpanded(connection_id, database, elem.table);
            toggle.innerText = table_expanded ? '▾' : '▸';

            let table_main = document.createElement('div');
            table_main.className = 'table-main';

            let table_link = document.createElement('button');
            table_link.type = 'button';
            table_link.className = 'table-link';
            table_link.appendChild(createNavigatorLabel('', elem.table, item_kind));

            let table_meta = document.createElement('span');
            table_meta.className = 'table-meta monospace';
            table_meta.title = `${elem.engine}${+elem.total_rows ? ` • ${formatReadableRows(elem.total_rows)} rows` : ''}${+elem.total_bytes ? ` • ${formatReadableBytes(elem.total_bytes)}` : ''}`;
            table_meta.textContent = elem.engine;

            let table_menu_button = document.createElement('button');
            table_menu_button.type = 'button';
            table_menu_button.className = 'table-menu';
            table_menu_button.innerText = '⋯';
            table_menu_button.title = item_kind == 'dictionary' ? 'Dictionary actions' : 'Table actions';
            table_menu_button.addEventListener('click', e => {
                e.stopPropagation();
                const rect = table_menu_button.getBoundingClientRect();
                openTableMenu(rect, server_address, user, password, database, elem.table, elem.engine);
            });

            const columns = document.createElement('div');
            columns.className = table_expanded ? 'columns open' : 'columns';

            const toggle_columns = async e => {
                e?.stopPropagation();
                const will_open = !columns.classList.contains('open');
                setTablesExpanded(connection_id, database, [elem.table], will_open);
                columns.classList.toggle('open', will_open);
                toggle.innerText = will_open ? '▾' : '▸';
                if (will_open) {
                    await loadColumns(server_address, user, password, database, elem.table, columns);
                }
            };

            toggle.addEventListener('click', toggle_columns);

            table_main.appendChild(table_link);
            table_main.appendChild(table_meta);
            table_main.appendChild(table_menu_button);
            table_row.appendChild(toggle);
            table_row.appendChild(table_main);
            table.appendChild(table_row);
            table.appendChild(columns);
            table_link.addEventListener('click', toggle_columns);
            if (table_expanded) {
                void loadColumns(server_address, user, password, database, elem.table, columns);
            }
            group_items.appendChild(table);
        }

        group_elem.appendChild(group_items);
        tables_elem.appendChild(group_elem);
    }

    if (!tables_elem.firstChild) {
        let table = document.createElement('div');
        table.className = 'no-tables';
        table.append('no tables');
        tables_elem.append(table);
    }
}

function applyConnection(connection) {
    if (!connection) {
        return;
    }

    closeConnectionEditor();
    current_connection_id = connection.id;
    current_connection_name = connection.name || 'Connection';
    window.localStorage.setItem(active_connection_key, current_connection_id);
    setConnectionExpanded(current_connection_id, true);
    updateNavigatorFooter(connection);
    updateActiveConnectionBanner(connection);

    url_elem.value = connection.url || '';
    user_elem.value = connection.user || 'default';
    password_elem.value = connection.password || '';

    renderNavigatorTree();
    checkURL();
    loadDatabases(connection.url, connection.user, connection.password);
}

function saveCurrentConnection(newConnection) {
    const connections = getSavedConnections();
    const current_connection = connections.find(connection => connection.id == current_connection_id) || {};
    const nextConnection = newConnection || {
        id: current_connection_id || createConnectionId(),
        name: current_connection_name || `Connection ${connections.length + 1}`,
        url: url_elem.value.trim(),
        user: user_elem.value.trim() || 'default',
        password: password_elem.value,
        folder_id: current_connection.folder_id || ''
    };

    saveConnectionRecord(nextConnection);
}

function loadConnections() {
    let connections = getSavedConnections();
    if (!connections.length) {
        const defaultConnection = createConnection('Localhost');
        connections = [defaultConnection];
        saveConnections(connections);
    }

    const storedActiveConnectionId = window.localStorage.getItem(active_connection_key);
    const activeConnection = connections.find(connection => connection.id == storedActiveConnectionId) || connections[0];
    applyConnection(activeConnection);
}

function scrollResultsToTop() {
    current_result_elements?.result_body?.scrollTo({ top: 0, left: 0 });
}

function keepResultTabVisible(result) {
    result?.tab?.scrollIntoView({ block: 'nearest', inline: 'nearest' });
}

function hasResultPanel(resultId) {
    return result_history.some(result => result.id == resultId);
}

function createResultPanel(requestNum, query) {
    const template = document.getElementById('result-panel-template');
    const panel = template.content.firstElementChild.cloneNode(true);
    const resultId = `result-${requestNum}`;
    const resultColor = queryToColor(query);
    panel.dataset.resultId = resultId;
    panel.style.setProperty('--result-color-rotate', resultColor);

    const tab = document.createElement('button');
    tab.type = 'button';
    tab.className = 'result-tab';
    tab.dataset.resultId = resultId;
    tab.style.setProperty('--result-color-rotate', resultColor);
    const tabTitle = document.createElement('span');
    tabTitle.className = 'result-tab-title';
    tabTitle.textContent = `#${requestNum} ${query.replace(/\s+/g, ' ').slice(0, 48) || 'result'}`;
    const tabStatus = document.createElement('span');
    tabStatus.className = 'result-tab-status';
    tabStatus.textContent = '✔';
    tabStatus.hidden = true;
    tab.append(tabTitle, tabStatus);
    tab.addEventListener('click', () => activateResultPanel(resultId));

    const elements = {
        panel: panel,
        result_body: panel.querySelector('.result-body'),
        result_chrome: panel.querySelector('.result-chrome'),
        result_summary: panel.querySelector('.result-summary'),
        result_query: panel.querySelector('.result-query'),
        result_stats: panel.querySelector('.result-stats'),
        data_div: panel.querySelector('.data-div'),
        result_download: panel.querySelector('.result-download'),
        result_copy: panel.querySelector('.result-copy'),
        copy_text: '',
        data_table: panel.querySelector('.data-table'),
        data_unparsed: panel.querySelector('.data-unparsed'),
        chart: panel.querySelector('.chart-output'),
        graph: panel.querySelector('.graph-output'),
        error: panel.querySelector('.error-output')
    };

    attachResultStatsSelection(elements.result_stats);
    attachResultDownloadButton(elements, resultId);
    attachResultCopyButton(elements);

    elements.result_query.innerText = query;
    results_header_elem.hidden = false;
    results_tabs_elem.appendChild(tab);
    results_panels_elem.appendChild(panel);
    document.getElementById('logo-container').style.display = 'none';

    const meta = {
        id: resultId,
        request_num: requestNum,
        query: query,
        connection_name: current_connection_name,
        tab: tab,
        tab_status: tabStatus,
        elements: elements,
        stats: '',
        base_stats: '',
        timing_stats: '',
        query_log_stats: '',
        progress_stats: '',
        progress_stats_updated_at: 0,
        summary_stats: '',
        query_id: '',
        stats_loading: false,
        ok: false
    };

    result_history.push(meta);
    current_result_elements = elements;
    current_result_meta = meta;
    activateResultPanel(resultId);
    return meta;
}

function activateResultPanel(resultId) {
    if (!hasResultPanel(resultId)) {
        updateActiveHistoryEntry(active_result_id);
        return;
    }

    active_result_id = resultId;
    let active_result = null;
    for (const result of result_history) {
        const isActive = result.id == resultId;
        result.tab.classList.toggle('active', isActive);
        result.elements.panel.classList.toggle('active', isActive);
        if (isActive) {
            active_result = result;
            current_result_elements = result.elements;
            current_result_meta = result;
            document.getElementById('stats').innerText = result.stats || '';
            last_query_for_download = result.query;
        }
    }

    keepResultTabVisible(active_result);
    updateActiveHistoryEntry(resultId);
}

function resetResultPanels() {
    result_history = [];
    active_result_id = null;
    current_result_elements = null;
    current_result_meta = null;
    results_tabs_elem.innerHTML = '';
    results_panels_elem.innerHTML = '';
    results_header_elem.hidden = true;
    document.getElementById('stats').innerText = '';
    document.getElementById('logo-container').style.display = 'block';
    renderActionHistory();
}

function setResultTabStatus(result = current_result_meta, status = '') {
    if (!result?.tab_status) {
        return;
    }

    result.tab_status.hidden = !status;
    result.tab_status.textContent = status == 'success' ? '✔' : '✕';
    result.tab_status.title = status == 'success' ? 'Query succeeded' : status == 'failed' ? 'Query failed' : '';
    result.tab.classList.toggle('succeeded', status == 'success');
    result.tab.classList.toggle('failed', status == 'failed');
}

function setResultTabSucceeded(result = current_result_meta, succeeded = false) {
    setResultTabStatus(result, succeeded ? 'success' : '');
}

function setResultTabFailed(result = current_result_meta) {
    setResultTabStatus(result, 'failed');
}

function setResultDownloadButtonVisible(elements = current_result_elements, visible = false) {
    const button = elements?.result_download;
    if (!button) {
        return;
    }

    button.style.display = visible ? 'inline-flex' : 'none';
    button.disabled = !visible;
}

function attachResultDownloadButton(elements, resultId) {
    const button = elements?.result_download;
    if (!button) {
        return;
    }

    setResultDownloadButtonVisible(elements, false);
    button.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();

        if (button.disabled) {
            return;
        }

        const result = result_history.find(candidate => candidate.id == resultId);
        if (!result?.ok) {
            setResultDownloadButtonVisible(elements, false);
            return;
        }

        last_query_for_download = result.query;
        openDownloadDropdown(button);
    });
}

function attachResultStatsSelection(stats) {
    if (!stats) {
        return;
    }

    ['pointerdown', 'mousedown', 'mouseup', 'dblclick'].forEach(eventName => {
        stats.addEventListener(eventName, event => {
            event.stopPropagation();
        });
    });

    stats.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
    });
}

function resetResultCopyButton(elements = current_result_elements) {
    const button = elements?.result_copy;
    if (!button) {
        return;
    }

    if (button.copy_feedback_timeout) {
        clearTimeout(button.copy_feedback_timeout);
        button.copy_feedback_timeout = null;
    }

    button.style.display = 'none';
    button.disabled = true;
    button.classList.remove('copied', 'copy-failed');
    button.textContent = '⧉';
    button.title = 'Copy formatted result';
    button.setAttribute('aria-label', 'Copy formatted result');
    elements.copy_text = '';
}

function showResultCopyButton(elements = current_result_elements, format = '') {
    const button = elements?.result_copy;
    if (!button) {
        return;
    }

    button.style.display = 'flex';
    button.disabled = false;
    button.title = format ? `Copy ${format} result` : 'Copy formatted result';
    button.setAttribute('aria-label', button.title);
}

function showResultCopyFeedback(button, copied) {
    if (button.copy_feedback_timeout) {
        clearTimeout(button.copy_feedback_timeout);
    }

    button.classList.toggle('copied', copied);
    button.classList.toggle('copy-failed', !copied);
    button.textContent = copied ? '✓' : '!';

    const original_title = button.getAttribute('aria-label') || 'Copy formatted result';
    button.title = copied ? 'Copied' : 'Copy failed';

    button.copy_feedback_timeout = setTimeout(() => {
        button.classList.remove('copied', 'copy-failed');
        button.textContent = '⧉';
        button.title = original_title;
        button.copy_feedback_timeout = null;
    }, 1200);
}

function attachResultCopyButton(elements) {
    const button = elements?.result_copy;
    if (!button) {
        return;
    }

    resetResultCopyButton(elements);
    button.addEventListener('click', async e => {
        e.stopPropagation();

        if (button.disabled) {
            return;
        }

        const copied = await copyTextToClipboard(elements.copy_text || elements.data_unparsed.textContent || '');
        showResultCopyFeedback(button, copied);
    });
}

function renderActionHistory() {
    action_body.replaceChildren();

    if (!action_history.length) {
        action_history_empty_elem.style.display = 'block';
        return;
    }

    action_history_empty_elem.style.display = 'none';

    for (const entry of [...action_history].reverse()) {
        const row = document.createElement('div');
        row.className = 'history-entry';
        row.dataset.resultId = entry.result_id;
        const result_available = hasResultPanel(entry.result_id);

        const main = document.createElement('button');
        main.type = 'button';
        main.className = 'history-entry-main';
        if (!result_available) {
            main.setAttribute('aria-disabled', 'true');
        }
        main.title = result_available ? entry.query : `${entry.query}\n\nResult is no longer open.`;
        main.addEventListener('click', () => {
            if (result_available) {

let load_databases_request_num = 0;
async function loadDatabases(server_address, user, password) {
    ++load_databases_request_num;
    const current_load_databases_request_num = load_databases_request_num;
    const target_connection_id = current_connection_id;
    schema_state = {
        loading: true,
        connection_id: target_connection_id,
        databases: [],
        tables: {},
        columns: {},
        loading_tables: {},
        table_messages: {},
        message: 'Loading schema...'
    };
    renderNavigatorTree();

    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSON';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);

    let response = await fetch(url, {
        method: "POST",
        body: `SELECT database, database = currentDatabase() AS current
            FROM system.databases WHERE database != 'INFORMATION_SCHEMA'
            ORDER BY
                database = 'information_schema',
                database = 'system',
                database != 'default',
                database`,
        headers: { 'Authorization': 'never' } });
    if (!response.ok) {
        schema_state = {
            loading: false,
            connection_id: target_connection_id,
            databases: [],
            tables: {},
            columns: {},
            loading_tables: {},
            table_messages: {},
            message: 'Failed to load schema.'
        };
        renderNavigatorTree();
        return false;
    }
    json = await response.json();

    if (current_load_databases_request_num != load_databases_request_num) return false;
    if (target_connection_id != current_connection_id) return false;

    // Use natural order for database names
    json.data.sort((a, b) => {
        // Maintain original order for default, system, information_schema
        const getPriority = (name) => {
            switch (name) {
                case 'default': return 0;
                case 'system': return 2;
                case 'information_schema': return 3
                default: return 1;
            }
        }

        return getPriority(a.database) - getPriority(b.database)
            || a.database.localeCompare(b.database, undefined, { numeric: true });
    });

    schema_state = {
        loading: false,
        connection_id: target_connection_id,
        databases: json.data,
        tables: {},
        columns: {},
        loading_tables: {},
        table_messages: {},
        message: json.data.length ? '' : 'No databases found.'
    };
    renderNavigatorTree();
}

async function loadTables(server_address, user, password, database) {
    schema_state.loading_tables[database] = true;
    delete schema_state.table_messages[database];
    renderNavigatorTree();

    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSON';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    url += '&param_database=' + encodeURIComponent(database);

    let response = await fetch(url, {
        method: "POST",
        body: `SELECT table, engine, total_rows, total_bytes FROM system.tables WHERE database = {database:String}
            ORDER BY table LIKE '.inner%', table`,
        headers: { 'Authorization': 'never' } });
    if (!response.ok) {
        delete schema_state.loading_tables[database];
        schema_state.table_messages[database] = 'Failed to load tables.';
        renderNavigatorTree();
        return false;
    }
    json = await response.json();

    if (schema_state.connection_id != current_connection_id) return false;

    delete schema_state.loading_tables[database];
    delete schema_state.table_messages[database];
    schema_state.tables[database] = json.data;
    renderNavigatorTree();
    return json.data;
}

            ? 'Double-click to insert column name at cursor. Right-click to generate stats'

async function loadColumns(server_address, user, password, database, table, container) {
    ++load_columns_request_num;
    const current_load_columns_request_num = load_columns_request_num;
    const cache_key = getSchemaTableKey(database, table);

    if (schema_state.columns[cache_key]) {
        renderColumns(container, schema_state.columns[cache_key], database, table);
        return schema_state.columns[cache_key];
    }

    container.innerHTML = 'loading columns...';

    const columns = await fetchTableColumns(server_address, user, password, database, table);
    if (columns === false) {
        container.innerText = 'failed to load columns';
        return false;
    }
    if (current_load_columns_request_num != load_columns_request_num) return false;

    schema_state.columns[cache_key] = columns;
    renderColumns(container, columns, database, table);
    return columns;
}

function appendSidebarResizer() {
    let drag_state = {
        is_dragging: false,
        offset_x: null,
        offset_width: null,
        current_width: null
    };

    const start = (e) => {
        if (e.button !== 0 || document.body.classList.contains('sidebar-collapsed')) {
            return;
        }

        drag_state.offset_x = e.clientX;
        drag_state.offset_width = menu_elem.getBoundingClientRect().width;
        drag_state.current_width = drag_state.offset_width;
        drag_state.is_dragging = true;
        document.body.classList.add('sidebar-resizing');

        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', stop);
        document.addEventListener('pointercancel', stop);
    };

    const move = (e) => {
        if (!drag_state.is_dragging) {
            return;
        }

        drag_state.current_width = drag_state.offset_width + (e.clientX - drag_state.offset_x);
        setSidebarWidth(drag_state.current_width, false);
    };

    const stop = () => {
        if (!drag_state.is_dragging) {
            return;
        }

        drag_state.is_dragging = false;
        document.body.classList.remove('sidebar-resizing');
        setSidebarWidth(drag_state.current_width, true);

        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', stop);
        document.removeEventListener('pointercancel', stop);
    };

    sidebar_resizer_elem.addEventListener('pointerdown', start);
    sidebar_resizer_elem.addEventListener('touchstart', (e) => e.preventDefault());
}

function formatUptime(t) {
    if (t < 60) { return t + " sec" }
    if (t < 3600) { return Number(t / 60).toFixed() + " min" }
    if (t < 86400) { return Number(t / 3600).toFixed() + " hr" }
    const days = Number(t / 86400).toFixed();
    return days + " day" + (days > 1 ? 's' : '');
}

function queryToColor(str) {
    let hash = 2166136261;
    for (let i = 0; i < str.length; i++) {
        hash ^= str.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
    }

    /// Limited range to avoid violet colors.
    return 50 + ((hash >>> 0) % 200);
}

function toBase64(str) {
    const encoder = new TextEncoder();
    const bytes = encoder.encode(str);
    const binary = Array.from(bytes, byte => String.fromCharCode(byte)).join('');
    return btoa(binary);
}

function fromBase64(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
    const decoder = new TextDecoder();
    return decoder.decode(bytes);
}

const default_format = 'JSONStringsEachRowWithProgress';
const non_clipboard_result_formats = new Set([
    'null',
    'rawblob'
]);
const always_clipboard_text_result_formats = new Set([
    'vertical'
]);
const binary_result_format_prefixes = [
    'arrow',
    'avro',
    'bson',
    'capnproto',
    'cbor',
    'msgpack',
    'native',
    'orc',
    'parquet',
    'protobuf',
    'rowbinary'
];

function getExplicitFormatName(query) {
    const match = query.match(/\bFORMAT\s+([A-Za-z][A-Za-z0-9_]*)/i);
    return match ? match[1] : '';
}

function isClipboardTextFormat(format) {
    const normalized_format = (format || '').toLowerCase();
    if (!normalized_format || non_clipboard_result_formats.has(normalized_format)) {
        return false;
    }

    if (always_clipboard_text_result_formats.has(normalized_format)) {
        return true;
    }

    return !binary_result_format_prefixes.some(prefix => normalized_format.startsWith(prefix));
}

function canCopyRenderedResult(is_raw, is_table, format) {
    return is_raw || is_table || always_clipboard_text_result_formats.has((format || '').toLowerCase());
}

function getClickHouseSummary(response) {
    const summary = response?.headers?.get('X-ClickHouse-Summary');
    if (!summary) {
        return null;
    }

    try {
        return JSON.parse(summary);
    } catch (e) {
        return null;
    }
}

function formatClickHouseSummary(summary) {
    const read_rows = Number(summary.read_rows || 0);
    const read_bytes = Number(summary.read_bytes || 0);
    const written_rows = Number(summary.written_rows || 0);
    const written_bytes = Number(summary.written_bytes || 0);
    const parts = [];

    if (read_rows || read_bytes) {
        parts.push(`Read ${formatReadableRows(read_rows)} rows, ${formatReadableBytes(read_bytes)}`);
    }
    if (written_rows || written_bytes) {
        parts.push(`Wrote ${formatReadableRows(written_rows)} rows, ${formatReadableBytes(written_bytes)}`);
    }

    return parts.join(', ');
}

function formatResultRows(rows, incomplete = false) {
    const rowCount = Number(rows || 0);
    if (!Number.isFinite(rowCount) || rowCount < 0) {
        return '';
    }

    const unit = rowCount == 1 ? 'row' : 'rows';
    return `${formatReadableRows(rowCount)}${incomplete ? '+' : ''} ${unit} in result`;
}

function markResultIncomplete() {
    if (incomplete_result) {
        return;
    }

    incomplete_result = true;
    updateProgressText();
}

function formatElapsedMs(elapsedNs, label = '') {
    const elapsedMs = Number(elapsedNs || 0) / 1e6;
    if (!Number.isFinite(elapsedMs) || elapsedMs <= 0) {
        return '';
    }

    const roundedMs = elapsedMs < 10
        ? elapsedMs.toFixed(1)
        : Math.round(elapsedMs).toLocaleString('en-US');
    return `${label ? `${label} ` : ''}${roundedMs} ms`;
}

function formatMsMetric(value, label) {
    if (!hasMsMetricValue(value)) {
        return '';
    }

    const ms = Number(value);
    const roundedMs = ms < 10
        ? ms.toFixed(1)
        : Math.round(ms).toLocaleString('en-US');
    return `${label} ${roundedMs}ms`;
}

function formatNsAsMsMetric(value, label) {
    return formatMsMetric(Number(value || 0) / 1e6, label);
}

function hasMsMetricValue(value) {
    if (value === null || value === undefined || value === '') {
        return false;
    }

    const ms = Number(value);
    return Number.isFinite(ms) && ms >= 0;
}

function sumMsMetrics(...values) {
    const metric_values = values.filter(hasMsMetricValue);
    if (!metric_values.length) {
        return null;
    }

    return metric_values.reduce((sum, value) => sum + Number(value), 0);
}

function setResultStats(result = current_result_meta, base_stats = result?.base_stats || '', timing_stats = result?.timing_stats || '') {
    if (!result) {
        return '';
    }

    result.base_stats = base_stats;
    result.timing_stats = timing_stats;
    result.stats = [base_stats, timing_stats].filter(Boolean).join(', ');

    if (result.elements?.result_stats) {
        result.elements.result_stats.textContent = result.stats;
        result.elements.result_stats.classList.toggle('loading', !!result.stats_loading);
        result.elements.result_stats.title = result.timing_stats
            ? 'query is total server wall time; parenthesized timings are ClickHouse profile counters and may not add up to query time.'
            : '';
    }
    if (result.id == active_result_id) {
        const stats = document.getElementById('stats');
        stats.innerText = result.stats;
        stats.title = result.elements?.result_stats?.title || '';
    }

    const history_entry = action_history.find(entry => entry.result_id == result.id);
    if (history_entry) {
        history_entry.stats = result.stats;
        renderActionHistory();
    }

    return result.stats;
}

function setResultStatsLoading(result = current_result_meta, loading = false) {
    if (!result) {
        return;
    }

    result.stats_loading = loading;
    result.elements?.result_stats?.classList.toggle('loading', loading);
}

function formatQueryLogStats(row) {
    if (!row) {
        return '';
    }

    const network_ms = sumMsMetrics(row.network_send_ms, row.network_receive_ms);
    const query = formatMsMetric(row.query_ms, 'query');
    const detail_parts = [
        formatMsMetric(row.cpu_ms, 'cpu'),
        formatMsMetric(network_ms, 'network'),
        formatMsMetric(row.io_wait_ms, 'io wait')
    ].filter(Boolean);
    const parts = [];

    if (query) {
        parts.push(detail_parts.length ? `${query} (${detail_parts.join(', ')})` : query);
    } else {
        parts.push(...detail_parts);
    }

    if (Number(row.memory_usage || 0) > 0) {
        parts.push(`memory ${formatReadableBytes(row.memory_usage)}`);
    }

    return parts.join(', ');
}

function applyClickHouseSummary(response) {
    const summary = getClickHouseSummary(response);
    if (!summary) {
        return false;
    }

    if (summary.elapsed_ns) {
        elapsed_ns = Number(summary.elapsed_ns);
    }

    const text = formatClickHouseSummary(summary);
    if (!text) {
        return false;
    }

    if (current_result_meta) {
        current_result_meta.summary_stats = text;
    }
    return text;
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function getQueryLogPollDelay(elapsed_ms) {
    if (!elapsed_ms) {
        return 500;
    }

    return elapsed_ms < query_log_poll_fast_window_ms ? 1000 : 5000;
}

async function fetchQueryLogStats(server_address, user, password, query_id) {
    const url = buildClickHouseUrl(server_address, user, password, 'JSONEachRow', {
        param_query_id: query_id
    });

    const response = await fetch(url, {
        method: 'POST',
        body: `SELECT
    query_duration_ms AS query_ms,
    if(
        mapContains(ProfileEvents, 'UserTimeMicroseconds')
            OR mapContains(ProfileEvents, 'OSUserTimeMicroseconds')
            OR mapContains(ProfileEvents, 'OSCPUVirtualTimeMicroseconds'),
        round(greatest(
            ProfileEvents['UserTimeMicroseconds'] + ProfileEvents['SystemTimeMicroseconds'],
            ProfileEvents['OSUserTimeMicroseconds'] + ProfileEvents['OSSystemTimeMicroseconds'],
            ProfileEvents['OSCPUVirtualTimeMicroseconds']
        ) / 1000, 1),
        NULL
    ) AS cpu_ms,
    if(
        mapContains(ProfileEvents, 'NetworkSendElapsedMicroseconds'),
        round(ProfileEvents['NetworkSendElapsedMicroseconds'] / 1000, 1),
        NULL
    ) AS network_send_ms,
    if(
        mapContains(ProfileEvents, 'NetworkReceiveElapsedMicroseconds'),
        round(ProfileEvents['NetworkReceiveElapsedMicroseconds'] / 1000, 1),
        NULL
    ) AS network_receive_ms,
    if(
        mapContains(ProfileEvents, 'OSIOWaitMicroseconds'),
        round(ProfileEvents['OSIOWaitMicroseconds'] / 1000, 1),
        NULL
    ) AS io_wait_ms,
    memory_usage
FROM system.query_log
WHERE (
    type = 'QueryFinish'
    OR (
        type = 'ExceptionWhileProcessing'
        AND (
            exception ILIKE '%Broken pipe%'
            OR exception ILIKE '%socket%'
            OR exception ILIKE '%NETWORK_ERROR%'
        )
    )
)
  AND (query_id = {query_id:String} OR initial_query_id = {query_id:String})
ORDER BY event_time_microseconds DESC
LIMIT 1`,
    });

    if (!response.ok) {
        return null;
    }

    const text = (await response.text()).trim();
    if (!text) {
        return null;
    }

    return JSON.parse(text.split('\n')[0]);
}

async function enrichResultStatsFromQueryLog(result, server_address, user, password, query_id) {
    if (!query_id) {
        return;
    }

    setResultStatsLoading(result, true);
    const started_at = performance.now();
    let elapsed_ms = 0;

    while (elapsed_ms < query_log_poll_timeout_ms) {
        const delay = Math.min(
            getQueryLogPollDelay(elapsed_ms),
            query_log_poll_timeout_ms - elapsed_ms
        );
        await sleep(delay);
        if (!result_history.includes(result) || result.query_id != query_id) {
            return;
        }
        elapsed_ms = performance.now() - started_at;

        try {
            const row = await fetchQueryLogStats(server_address, user, password, query_id);
            const query_log_stats = formatQueryLogStats(row);
            if (query_log_stats) {
                result.query_log_stats = query_log_stats;
                setResultStatsLoading(result, false);
                setResultStats(result, result.base_stats, query_log_stats);
                return;
            }
        } catch (e) {
            console.log(e);
            setResultStatsLoading(result, false);
            return;
        }
    }

    setResultStatsLoading(result, false);
}

async function postImpl(posted_request_num, query)

    /// Optional: write the interactive result into query cache so a later download can reuse it.
    if (shouldUseQueryCacheForDownload()) {
        url += '&use_query_cache=1&enable_reads_from_query_cache=0&enable_writes_to_query_cache=1&query_cache_ttl=600&query_cache_nondeterministic_function_handling=save';
    }

    /// Extremes only if the format is likely to be unchanged. This is imprecise.
    if (!explicit_format) url += '&extremes=1';

    last_query_start = performance.now();

    setResultTabSucceeded(current_result_meta, false);
    setResultDownloadButtonVisible(current_result_elements, false);
    document.getElementById('hourglass').style.display = 'inline-block';

    clear();

    let is_table = false;
    let is_raw = false;
    let is_chart = false;
    let is_error = false;

    let response, reply, format, query_id;
    reply = '';
    try {
        controller = new AbortController();
        response = await fetch(url, { method: "POST", body: query, signal: controller.signal,
            headers: { 'Authorization': 'never' } });

        format = response.headers.get('X-ClickHouse-Format') ?? default_format;
        query_id = response.headers.get('X-ClickHouse-Query-Id') || '';
        if (current_result_meta) {
            current_result_meta.query_id = query_id;
        }

        if (!response.ok) {
            is_error = true;
            reply = await response.text();
            if (posted_request_num != request_num) { return; }

            let has_exception = false;
            for (line of reply.split('\n')) {
                if (line.startsWith(`{"exception":`)) {
                    update(JSON.parse(line));
                    has_exception = true;
                    break;
                }
            }
            if (!has_exception) {
                renderError(reply);
            }

            if (current_result_meta) {
                current_result_meta.ok = false;
                setResultTabFailed(current_result_meta);
                current_result_meta.stats = document.getElementById('stats').innerText || '';
                current_result_meta.elements.result_stats.innerText = current_result_meta.stats;
                action_history.push({
                    result_id: current_result_meta.id,
                    request_num: current_result_meta.request_num,
                    connection_name: current_result_meta.connection_name,
                    query: query,
                    message: reply || 'Query failed',
                    stats: current_result_meta.stats,
                    ok: false
                });
                renderActionHistory();
            }

            document.getElementById('hourglass').style.display = 'none';
            setResultDownloadButtonVisible(current_result_elements, false);
            document.documentElement.style.setProperty('--progress', '0');
            return;
        } else if (format == default_format) {
            is_table = true;
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            let buffer = '';
            let stream_aborted = false;
            let draining_after_preview_limit = false;
            const updateDefaultFormatLine = (line, fragment, append_raw_newline, render_rows = true) => {
                if (!line.trim()) {
                    return true;
                }

                if (!render_rows && line.startsWith('{"row":')) {
                    markResultIncomplete();
                    return true;
                }

                let data;
                try {
                    data = JSON.parse(line);
                } catch (e) {
                    if (!render_rows) {
                        return true;
                    }
                    is_table = false;
                    is_raw = true;
                    updateRaw(append_raw_newline ? `${line}\n` : line);
                    return true;
                }

                if (!render_rows && data.row) {
                    markResultIncomplete();
                    return true;
                }

                return update(data, fragment) !== false;
            };

            while (true) {
                const { done, value } = await reader.read();
                if (posted_request_num != request_num) { return; }
                if (done) {
                    const trailing_content = decoder.decode();
                    if (trailing_content) {
                        buffer += trailing_content;
                        if (!draining_after_preview_limit) {
                            reply += trailing_content;
                        }
                    }
                    break;
                }

                let new_content = decoder.decode(value, { stream: true });
                buffer += new_content;
                if (!draining_after_preview_limit) {
                    reply += new_content;
                }

                let lines = buffer.split('\n');
                let fragment = document.createDocumentFragment();

                let cont = true;
                for (const line of lines.slice(0, -1)) {
                    cont = updateDefaultFormatLine(line, fragment, true, !draining_after_preview_limit);
                    if (!cont) { break; }
                }

                if (fragment.hasChildNodes()) {
                    getCurrentTbody()?.appendChild(fragment);
                }

                if (!cont)
                {
                    if (shouldAbortAtPreviewLimit()) {
                        stream_aborted = true;
                        controller.abort();
                        break;
                    }

                    draining_after_preview_limit = true;
                    buffer = '';
                    continue;
                }
                buffer = lines[lines.length - 1];
            }

            if (!stream_aborted && buffer.trim()) {
                let fragment = document.createDocumentFragment();
                const cont = updateDefaultFormatLine(buffer, fragment, false, !draining_after_preview_limit);
                if (fragment.hasChildNodes()) {
                    getCurrentTbody()?.appendChild(fragment);
                }
                if (!cont) {
                    if (shouldAbortAtPreviewLimit()) {
                        controller.abort();
                    }
                }
            }
        } else if (format == 'JSONCompactColumns') {
            is_chart = true;
            reply = await response.text();
            if (posted_request_num != request_num) { return; }
            renderChart(JSON.parse(reply));
        } else {
            is_raw = true;
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                let new_content = decoder.decode(value, { stream: true });
                reply += new_content;

                if (posted_request_num != request_num) { return; }
                updateRaw(new_content);
            }
        }
    } catch (e) {
        if (posted_request_num != request_num) { return; }

        console.log(e);
        if (e instanceof TypeError) {
            reply = "Network error";
        } else if (e.name === 'AbortError') {
            reply = "Query was cancelled";
        } else {
            reply = e.toString();
        }
        renderError(reply);
        if (current_result_meta) {
            current_result_meta.ok = false;
            setResultTabFailed(current_result_meta);
            current_result_meta.stats = '';
            current_result_meta.elements.result_stats.innerText = '';
            action_history.push({
                result_id: current_result_meta.id,
                request_num: current_result_meta.request_num,
                connection_name: current_result_meta.connection_name,
                query: query,
                message: reply || 'Query failed',
                stats: '',
                ok: false
            });
            renderActionHistory();
        }
        document.getElementById('hourglass').style.display = 'none';
        setResultDownloadButtonVisible(current_result_elements, false);
        setResultTabFailed(current_result_meta);
        document.documentElement.style.setProperty('--progress', '0');
        return;
    }

    if (is_explain_graph) {
        await renderGraph();
    } else {
        if (extremes['min'] && extremes['max']) renderExtremes();
        if (is_table) transposeTableIfNeeded();
    }

    document.getElementById('hourglass').style.display = 'none';
    setResultDownloadButtonVisible(current_result_elements, true);
    last_query_for_download = query;

    const copy_format = explicit_format || format;
    if (explicit_format && isClipboardTextFormat(copy_format) && canCopyRenderedResult(is_raw, is_table, copy_format)) {
        current_result_elements.copy_text = reply;
        showResultCopyButton(current_result_elements, copy_format);
    } else {
        resetResultCopyButton();
    }

    if (is_raw || !elapsed_ns) {
        elapsed_ns = 1e6 * (performance.now() - last_query_start);
    }

    const summary_text = applyClickHouseSummary(response) || '';
    const progress_text = row_idx || is_table ? formatResultRows(row_idx, incomplete_result) : '';
    const base_stats_text = [progress_text, summary_text].filter(Boolean).join(', ');
    const timing_stats_text = query_id ? '' : formatNsAsMsMetric(elapsed_ns, 'query');
    const result_stats_text = setResultStats(current_result_meta, base_stats_text, timing_stats_text);
    document.documentElement.style.setProperty('--progress', '0');

    if (current_result_meta) {
        current_result_meta.ok = true;
        setResultTabSucceeded(current_result_meta, true);
        if (!current_result_meta.stats) {
            current_result_meta.stats = result_stats_text || document.getElementById('stats').innerText || document.getElementById('progress').innerText || '';
            current_result_meta.elements.result_stats.innerText = current_result_meta.stats;
        }
        clearElement(document.getElementById('progress'));
        action_history.push({
            result_id: current_result_meta.id,
            request_num: current_result_meta.request_num,
            connection_name: current_result_meta.connection_name,
            query: query,
            message: row_idx ? `${row_idx}${incomplete_result ? '+' : ''} row(s) rendered` : (is_raw ? 'Raw result' : 'Completed'),
            stats: current_result_meta.stats,
            ok: true
        });
        renderActionHistory();
        void enrichResultStatsFromQueryLog(current_result_meta, server_address, user, password, query_id);
    }

    if (posted_request_num != request_num) { return; }

    /// The query is saved in browser history (in a state JSON object)
    /// as well as in URL fragment identifier.
    if (query != previous_query) {
        const state = {
            query: query,
            format: format,
            ok: response.ok,
            data: reply.length > 100000 ? null : reply, /// Lower than the browser's limit.
            elapsed_ns: elapsed_ns,
        };
        const title = "ClickHouse Query: " + query;

        let history_url = window.location.pathname + '?user=' + encodeURIComponent(user);
        if (run_immediately) {
            history_url += "&run=1";
        }
        if (server_address != location.origin) {
            /// Save server's address in URL if it's not identical to the address of the play UI.
            history_url += '&url=' + encodeURIComponent(server_address);
        }
        history_url += '#' + toBase64(query);

        if (previous_query == '') {
            history.replaceState(state, title, history_url);
        } else {
            history.pushState(state, title, history_url);
        }
        document.title = title;
        previous_query = query;
    }
}

async function restoreFromHistory(state) {
    resetResultPanels();
    createResultPanel(++request_num, state.query);
    clear();
    query_area.value = state.query;

    if (!state.data) return;

    let is_table = false;
    let is_raw = false;
    let is_chart = false;
    let is_error = false;

    let format = state.format;
    const explicit_format = getExplicitFormatName(state.query);

    if (!state.ok) {
        is_error = true;

        let has_exception = false;
        for (line of state.data.split('\n')) {
            if (line.startsWith(`{"exception":`)) {
                update(JSON.parse(line));
                has_exception = true;
                break;
            }
        }
        if (!has_exception) {
            renderError(state.data);
        }

        document.getElementById('hourglass').style.display = 'none';
        setResultDownloadButtonVisible(current_result_elements, false);
        if (current_result_meta) {
            current_result_meta.ok = false;
            setResultTabFailed(current_result_meta);
        }
        document.documentElement.style.setProperty('--progress', '0');
        return;
    } else if (format == default_format) {
        is_table = true;
        let lines = state.data.split('\n');
        let fragment = document.createDocumentFragment();

        for (const line of lines) {
            if (line.length == 0) continue;
            if (update(JSON.parse(line), fragment) === false) { break; }
        }

        if (fragment.hasChildNodes()) {
            getCurrentTbody()?.appendChild(fragment);
        }
    } else if (format == 'JSONCompactColumns') {
        is_chart = true;
        renderChart(JSON.parse(state.data));
    } else {
        is_raw = true;
        updateRaw(state.data);
    }

    if (is_explain_graph) {
        await renderGraph();
    } else {
        if (extremes['min'] && extremes['max']) renderExtremes();
        if (is_table) transposeTableIfNeeded();
    }

    document.getElementById('hourglass').style.display = 'none';
    setResultDownloadButtonVisible(current_result_elements, true);
    last_query_for_download = state.query;
    if (current_result_meta) {
        current_result_meta.ok = true;
        setResultTabSucceeded(current_result_meta, true);
    }

    const copy_format = explicit_format || format;
    if (explicit_format && isClipboardTextFormat(copy_format) && canCopyRenderedResult(is_raw, is_table, copy_format)) {
        current_result_elements.copy_text = state.data;
        showResultCopyButton(current_result_elements, copy_format);
    } else {
        resetResultCopyButton();
    }

    if (is_raw) elapsed_ns = state.elapsed_ns;

    const restored_base_stats_text = row_idx ? formatResultRows(row_idx, incomplete_result) : '';
    const restored_timing_stats_text = formatNsAsMsMetric(elapsed_ns, 'query');
    if (current_result_meta) {
        setResultStats(current_result_meta, restored_base_stats_text, restored_timing_stats_text);
    }
    document.documentElement.style.setProperty('--progress', '0');
}

/// Pressing Tab in textarea will increase indentation.
/// But for accessibility reasons, we will fall back to tab navigation if the user already used Tab for that.

let user_prefers_tab_navigation = false;

[...document.querySelectorAll('input')].map(elem => {
    elem.onkeydown = (e) => {
        if (e.key == 'Tab') { user_prefers_tab_navigation = true; }
    };
});

query_area.onkeydown = (e) => {
    if (e.key == 'Tab' && !e.shiftKey && !user_prefers_tab_navigation) {
        e.preventDefault();
        replaceQueryEditorRange('    ');
        return false;
    } else if (e.key === 'Enter' && !(e.metaKey || e.ctrlKey)) {
        // If the user presses Enter, and the previous line starts with spaces,
        // then we will insert the same number of spaces.
        const elem = e.target;
        if (elem.selectionStart !== elem.selectionEnd) {
            // If there is a selection, then we will not insert spaces.
            return;
        }
        const cursor_pos = elem.selectionStart;

        const elem_value = elem.value;
        const text_before_cursor = elem_value.substring(0, cursor_pos);
        const prev_lines = text_before_cursor.split('\n');
        const prev_line = prev_lines.pop();
        const lead_spaces = prev_line.match(/^\s*/)[0];
        if (!lead_spaces) {
            return;
        }

        e.preventDefault();
        replaceQueryEditorRange('\n' + lead_spaces, cursor_pos, cursor_pos);
        return false;
    } else if ((e.ctrlKey || e.metaKey) && e.key === '/' && !e.shiftKey) {
        // Comment/uncomment selected lines on Ctrl+/ or Cmd+/
        const elem = e.target;
        const start = elem.selectionStart;
        const end = elem.selectionEnd;
        const value = elem.value;

        let lineStart = value.lastIndexOf('\n', start - 1) + 1;
        let lineEnd = value.indexOf('\n', end);
        if (lineEnd === -1) lineEnd = value.length;

        let selectedText = value.substring(lineStart, lineEnd);
        let lines = selectedText.split('\n');

        // Comment out each line, or uncomment if all lines are already commented
        const allCommented = lines.every(line => /^\s*--/.test(line));

        // If all lines are commented out, uncomment them
        if (allCommented) {
            lines = lines.map(line => line.replace(/^(\s*)-- ?/, '$1'));
        } else {
            lines = lines.map(line => {
                if (/^\s*$/.test(line)) {
                    return line;
                }
                return line.replace(/^(\s*)/, '$1-- ');
            });
        }

        const replacedText = lines.join('\n');

        e.preventDefault();
        // Adjust selection to keep the user in flow and enable quick reversal
        replaceQueryEditorRange(replacedText, lineStart, lineEnd, lineStart, lineStart + replacedText.length);
        return false;
    }
};

function formatReadable(number = 0, decimals = 2, units = []) {
    const k = 1000;
    const i = number ? Math.floor(Math.log(number) / Math.log(k)) : 0;
    const unit = units[i];
    const dm = unit ? decimals : 0;
    return Number(number / Math.pow(k, i)).toFixed(dm) + unit;
}

function formatReadableBytes(bytes) {
    const units = [' B', ' KB', ' MB', ' GB', ' TB', ' PB', ' EB', ' ZB', ' YB'];

    return formatReadable(bytes, 2, units);
}

function formatReadableRows(rows) {
    const units = ['', ' thousand', ' million', ' billion', ' trillion', ' quadrillion'];

    return formatReadable(rows, 2, units);
}

function renderCell(name, value)
{
    let td = document.createElement('td');

    let is_null = (value === null);
    let is_link = false;

    /// Test: SELECT number, toString(number) AS str, number % 2 ? number : NULL AS nullable, range(number) AS arr, CAST((['hello', 'world'], [number, number % 2]) AS Map(String, UInt64)) AS map FROM numbers(10)
    let text;
    if (is_null) {
        text = 'ᴺᵁᴸᴸ';
    } else if (typeof(value) === 'object') {
        text = JSON.stringify(value);
    } else {
        text = value;

        /// If it looks like URL, create a link. This is for convenience.
        if (typeof(value) == 'string' && value.match(/^https?:\/\/\S+$/)) {
            is_link = true;
        }
    }

    let node = document.createTextNode(text);
    if (is_link) {
        let link = document.createElement('a');
        link.appendChild(node);
        link.href = text;
        link.setAttribute('target', '_blank');
        node = link;
    }

    td.className = column_is_number[name] ? 'right' : 'left';

    if (column_is_number[name]) {
        if (text.length >= 5 && text.match(/^[\d]{5,}$/)) {
            let i = 0;
            td.innerHTML = text.split('').reverse().map(c => {
                if (i > 0 && i % 3 == 0) { c = `<u>${c}<\/u>`; }; ++i; return c;
            }).reverse().join('');
            return td;
        }
    }

    td.appendChild(node);
    return td;
}

document.getElementById('query').addEventListener('focus', e => {
    current_selected_cell?.classList.remove('td-selected');
    current_selected_cell?.parentElement.classList.remove('tr-selected');
    current_selected_cell = null;
});

document.addEventListener('keydown', e => {
    let cell = current_selected_cell;
    if (!cell) { return; }

    const row = cell.parentElement;
    const table = row.parentElement;
    let cell_index = cell.cellIndex;
    let row_index = row.rowIndex;

    switch(e.key) {
        case 'ArrowUp': --row_index; break;
        case 'ArrowDown': ++row_index; break;
        case 'ArrowLeft': --cell_index; break;
        case 'ArrowRight': ++cell_index; break;
        default:
            return;
    }

    /// The first cell in each row is the row number.
    if (row_index < 0 || cell_index <= 0) { return; }

    let new_cell = table.rows[row_index]?.cells[cell_index];
    if (!new_cell) { return; }

    e.preventDefault();

    cell.classList.remove('td-selected');
    cell.parentElement.classList.remove('tr-selected');
    new_cell.classList.add('td-selected');
    new_cell.parentElement.classList.add('tr-selected');
    new_cell.scrollIntoView({ block: 'nearest' });
    current_selected_cell = new_cell;
});

function transposeTableIfNeeded()
{
    let table = getCurrentDataTable();
    if (Object.keys(header).length == 0 || table.rows.length > 1 || table.rows[0]?.cells.length <= 5) return;

    let heads = table.tHead.childNodes;
    let values = table.rows[0]?.cells;
    let num_cols = heads.length - 1;

    let new_tbody = document.createElement('tbody');
    for (let i = 0; i < num_cols; ++i) {
        let tr = document.createElement('tr');
        let th = heads[1];
        th.className = 'right';
        th.style.width = '0';
        th.removeChild(th.querySelector('.resizer'))
        tr.appendChild(th);
        if (values) {
            let td = values[1];
            td.classList.remove('right');
            tr.appendChild(td);
        } else if (i == 0) {
            /// If the result is empty, show this fact with a style.
            let td = document.createElement('td');
            td.rowSpan = num_cols;
            td.className = 'empty-result';
            let div = document.createElement('div');
            div.appendChild(document.createTextNode("empty result"));
            div.className = 'empty-result';
            td.appendChild(div);
            tr.appendChild(td);
        }
        new_tbody.appendChild(tr);
    }

    table.removeChild(table.tHead);
    table.removeChild(table.tBodies[0]);
    table.appendChild(new_tbody);
}

function update(json, fragment) {
    if (json.progress) {
        updateProgress(json.progress);
        return true;
    } else if (json.meta) {
        appendHeader(json.meta);
        return true;
    } else if (json.row) {
        if (is_explain_graph
            || (row_idx == 0 && Object.keys(json.row).length == 1 && json.row.explain == 'digraph'
                && query_area.value.match(/^\s*EXPLAIN/i))) {
            is_explain_graph = true;
            explain_graph += json.row.explain + '\n';
            return true;
        } else {
            return appendRow(json.row, fragment);
        }
    } else if (json.min) {
        extremes['min'] = json.min;
        return true;
    } else if (json.max) {
        extremes['max'] = json.max;
        return true;
    } else if (json.exception) {
        renderError(json.exception);
        return true;
    }

    return true;
}

function updateProgressText(show_progress_status = true, show_elapsed = true, elapsed_label = 'Elapsed') {
    let progress_elem = document.getElementById('progress');
    const server_progress_age_ms = current_result_meta?.progress_stats_updated_at
        ? performance.now() - current_result_meta.progress_stats_updated_at
        : Infinity;
    const server_progress_text = server_progress_age_ms < 1000
        ? current_result_meta?.progress_stats || ''
        : '';
    const parts = [];
    if (row_idx) {
        parts.push(formatResultRows(row_idx, incomplete_result));
    }
    if (show_elapsed) {
        parts.push(formatElapsedMs(elapsed_ns, elapsed_label));
    }

    const rendered_progress_text = parts.filter(Boolean).join(', ');
    const progress_text = server_progress_text || (!show_progress_status ? rendered_progress_text : '');
    if (server_progress_text) {
        progress_elem.innerHTML = server_progress_text;
    } else {
        progress_elem.innerText = progress_text;
    }
    progress_elem.style.display = show_progress_status && progress_text ? 'block' : 'none';
    if (current_result_elements?.result_stats && !current_result_meta?.stats) {
        if (server_progress_text) {
            current_result_elements.result_stats.innerHTML = server_progress_text;
        } else {
            current_result_elements.result_stats.innerText = progress_text;
        }
    }
    return progress_text;
}

function updateProgress(progress) {
    let stats = document.getElementById('stats');
    let progress_elem = document.getElementById('progress');

    const rows = +progress.read_rows;
    const bytes = +progress.read_bytes;
    const total_rows = +progress.total_rows_to_read;
    elapsed_ns = +progress.elapsed_ns;

    let formatted_rows = formatReadableRows(rows);
    let formatted_bytes = formatReadableBytes(bytes);

    const rps = rows * 1e9 / elapsed_ns;
    const bps = bytes * 1e9 / elapsed_ns;

    let formatted_rps = formatReadableRows(rps) + '/sec';
    let formatted_bps = formatReadableBytes(bps) + '/sec';

    if (rows >= 1e11) { formatted_rows = `<b>${formatted_rows}<\/b>`; }
    if (bytes >= 1e12) { formatted_bytes = `<b>${formatted_bytes}<\/b>`; }
    if (rps >= 1e10) { formatted_rps = `<b>${formatted_rps}<\/b>`; }
    if (bps >= 1e10) { formatted_bps = `<b>${formatted_bps}<\/b>`; }

    let text = '';

    if (total_rows) { text += (100 * Math.min(1.0, rows / total_rows)).toFixed(1) + '%, '; }

    text += `Read ${formatted_rows} rows, ${formatted_bytes}`;

    if (rps > 1e6) { text += ` (${formatted_rps}, ${formatted_bps})`; }

    stats.innerHTML = text;
    if (current_result_elements?.result_stats) {
        current_result_elements.result_stats.innerHTML = text;
    }
    if (current_result_meta) {
        current_result_meta.progress_stats = text;
        current_result_meta.progress_stats_updated_at = performance.now();
    }

    updateProgressText();

    document.documentElement.style.setProperty('--progress',
        rows && total_rows ? (100 * rows / total_rows) + '%' : '0');
}

function appendHeaderResizer(header) {
    let drag_state = {
        elem: null,
        is_dragging: true,
        offset_x: null,
        offset_width: null
    };

    const start = (e) => {
        if (e.button !== 0) { return; }

        changeTableLayout();
        drag_state.offset_x = e.clientX;
        drag_state.offset_width = header.offsetWidth;
        drag_state.is_dragging = true;
        drag_state.elem = e.target;
        drag_state.elem.classList.add('resizer-dragging');

        document.addEventListener('pointermove', move);
        document.addEventListener('pointerup', stop);
        document.addEventListener('pointercancel', stop);
    }

    const move = (e) => {
        if (!drag_state.is_dragging) { return; }

        const dx = e.clientX - drag_state.offset_x;
        header.style.width = `${drag_state.offset_width + dx}px`;
        if(dx < 0) {
            const table = getCurrentDataTable();
            table.style.setProperty('--table-width', `${table.offsetWidth + dx}px`)
        };
    }

    const stop = (e) => {
        drag_state.is_dragging = false;
        drag_state.elem.classList.remove('resizer-dragging');

        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', stop);
        document.removeEventListener('pointercancel', stop);
    }

    const resizer = document.createElement('div');
    resizer.className = 'resizer';
    resizer.addEventListener('pointerdown', start);
    resizer.addEventListener('touchstart', (e) => e.preventDefault());

    header.appendChild(resizer);
}


function appendTextareaResizer() {

    const textarea = document.getElementById('query');

    let drag_state = {
