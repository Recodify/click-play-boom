            display: block;

        {
            width: 100%;

            grid-template-columns: 1.1rem auto;
            align-items: center;
            column-gap: 0.55rem;

            background: transparent;
            color: var(--text-color);
            padding: 0.38rem 0.55rem;

        {
            display: inline-flex;

            text-overflow: ellipsis;

        .navigator-footer
        {

            font-size: 0.78rem;

        .navigator-footer-primary

            gap: 0.35rem;

        {

            color: var(--navigator-muted-color);
            opacity: 0.82;
            white-space: nowrap;
        }

        .navigator-footer-status-text
        {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;

        #sidebar-resizer

            bottom: 0;
            width: 0.55rem;
            cursor: col-resize;

        }

        #sidebar-resizer::before
        {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            transform: translateX(-50%);
            background: var(--border-color);
            opacity: 0.65;
        }

        body.sidebar-resizing #sidebar-resizer::before,
        #sidebar-resizer:hover::before
        {
            opacity: 1;
            background: var(--misc-text-color);

            border: 1px solid var(--navigator-card-border);
            background: var(--navigator-card-header-active);
        }

        {
            color: var(--misc-text-color);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;

            min-width: 0;
            display: flex;

            gap: 0.25rem 0.18rem;
            align-items: baseline;

        {
            flex: 0 1 auto;
            min-width: 0;
            font-size: 0.98rem;
            font-weight: 700;

        .active-connection-meta
        {
            flex: 0 1 auto;
            min-width: 0;
            color: var(--misc-text-color);
            font-family: inherit;
            font-size: 0.84rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Otherwise Webkit based browsers will display ugly border on focus. */
        textarea, input, button
        {
            outline: none;
            border: none;
            color: var(--text-color);
        }

        .monospace
        {
            /* Prefer fonts that have full hinting info. This is important for non-retina displays.
               Also I personally dislike "Ubuntu" font due to the similarity of 'r' and 'г' (it looks very ignorant). */
            font-family: DejaVu Sans Mono, Liberation Mono, MonoLisa, Consolas, monospace;
        }

        .shadow
        {
            box-shadow: 0 0 1rem var(--shadow-color);
        }

        input, textarea
        {
            border: 1px solid var(--border-color);
            /* The font must be not too small (to be inclusive) and not too large (it's less practical and make general feel of insecurity) */
            font-size: 11pt;
            padding: 0.25rem;
            background-color: var(--element-background-color);
        }

        input:focus, textarea:focus
        {
            color: var(--text-color-active);
        }

        #query
        {
            display: block;
            background-color: var(--query-editor-background-color);
            color: var(--query-editor-text-color);
            /* Make enough space for even big queries. */
            height: clamp(16rem, 50vh, 48rem);
            min-height: 4rem;
            max-height: min(calc(100vh - 10rem), 70rem);
            /* Keeps query text-area's width full screen even when user adjusting the width of the query box. */
            width: 100%;
            min-width: 100%;
            max-width: 100%;
            margin-top: -1px; /* To compensate the border. */
            contain: strict; /* Less input lag even if the table is large. */
            resize: none; /* Disable default browser resizer */
        }

        #query_div.compact #query
        {
            height: 3.5rem !important;
            min-height: 3.5rem;
        }

        #inputs
        {
            white-space: nowrap;
        }

        #url
        {
            width: 70%;
        }

        #user, #password

            width: calc(15% + 1px);
            margin-left: -1px;
        }

            color: var(--element-color-ok);
        }

        input.fail

            background-color: var(--element-background-color-fail);
        }

            font-size: 0.95rem;

            text-overflow: ellipsis;
            white-space: nowrap;

        }

            min-width: 0;
        }

        .result-summary-toggle
        {
            display: grid;
            grid-template-columns: auto auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 0.45rem;
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--border-color);
            background: var(--table-header-color);
            cursor: pointer;
            user-select: none;
            min-width: 0;
        }

        .result-summary-toggle::-webkit-details-marker
        {
            display: none;
        }

        .result-summary-toggle:hover,
        .result-summary-toggle:focus
        {
            border-color: var(--border-color-selected);
            color: var(--text-color-active);
        }

        .result-summary-marker
        {
            display: inline-block;
            width: 1em;
            color: var(--text-color);
            line-height: 1;
        }

        .result-summary[open] .result-summary-marker
        {
            transform: rotate(90deg);
        }

        .result-summary-title
        {
            color: var(--text-color);
            font-size: 0.82em;
            font-weight: 600;
            white-space: nowrap;
        }

        .result-stats
        {
            color: var(--misc-text-color);
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.85em;
            text-align: right;
            cursor: text;
            user-select: text;
        }

        .result-stats.loading::after
        {
            content: " | fetching stats";
            display: inline-block;
            width: 9.8em;
            margin-left: 0.35rem;
            text-align: left;
            animation: result-stats-loading 1.2s steps(4, end) infinite;
        }

        @keyframes result-stats-loading
        {
            0% { content: " | fetching stats"; }
            25% { content: " | fetching stats."; }
            50% { content: " | fetching stats.."; }
            75%, 100% { content: " | fetching stats..."; }
        }

        .result-query
        {
            display: block;
            margin-top: -1px;
            padding: 0.45rem 0.5rem;
            border: 1px solid var(--border-color);
            background: var(--element-background-color);
            color: var(--text-color);
            white-space: pre-wrap;
            max-height: min(30vh, 18rem);
            overflow-y: auto;
            font-size: 0.85em;
        }

        #history-panel
        {
            min-height: 0;
        }

        #action_history
        {
            display: flex;
            flex: 1 1 auto;
            min-height: 0;
            flex-direction: column;
        }

        #action-history-empty
        {
            color: var(--navigator-muted-color);
            margin-top: 0.25rem;
        }

        #action_body
        {
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
            padding-right: 0.35rem;
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .history-entry
        {
            width: 100%;
            min-width: 0;
            border: 1px solid var(--navigator-card-border);
            background: var(--navigator-card-background);
            color: var(--navigator-text-color);
            padding: 0.45rem;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.28rem;
            align-items: start;
            text-align: left;
            font: inherit;
        }

        .history-entry:hover,
        .history-entry.active
        {
            border-color: var(--border-color-selected);
            background: var(--navigator-card-header-active);
        }

        .history-entry-main
        {
            min-width: 0;
            border: none;
            background: transparent;
            color: inherit;
            padding: 0;
            display: grid;
            gap: 0.28rem;
            text-align: left;
            cursor: pointer;
            font: inherit;
        }

        .history-entry-main[aria-disabled="true"]
        {
            cursor: default;
            opacity: 0.62;
        }

        .history-entry-copy
        {
            width: 1.45rem;
            height: 1.45rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--navigator-card-border);
            background: color-mix(in srgb, var(--navigator-card-header) 70%, transparent);
            color: var(--navigator-text-color);
            padding: 0;
            cursor: pointer;
            line-height: 1;
            font: inherit;
        }

        .history-entry-copy:hover,
        .history-entry-copy:focus,
        .history-entry-copy.copied
        {
            background: var(--navigator-card-header-active);
            color: var(--navigator-link-hover-color);
        }

        .history-entry-meta,
        .history-entry-detail
        {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .history-entry-meta
        {
            font-size: 0.76rem;
            font-weight: 700;
        }

        .history-entry-number,
        .history-entry-detail
        {
            color: var(--navigator-muted-color);
        }

        .history-entry-status.ok
        {
            color: var(--element-color-ok);
        }

        .history-entry-status.fail
        {
            color: var(--border-color-selected);
        }

        .history-entry-connection,
        .history-entry-message,
        .history-entry-stats
        {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-entry-connection
        {
            flex: 1 1 auto;
        }

        .history-entry-query
        {
            min-width: 0;
            color: var(--navigator-text-color);
            font-size: 0.78rem;
            line-height: 1.28;
            white-space: pre-wrap;
            word-break: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .history-entry-detail
        {
            font-size: 0.72rem;
        }

        .history-entry-message
        {
            flex: 1 1 auto;
        }

        .history-entry-stats
        {
            flex: 0 0 auto;
            max-width: 45%;
        }

        #data_div, .data-div
        {
            margin-top: 0;
            background-color: var(--element-background-color);
        }

        .result-output-actions
        {
            display: flex;
            justify-content: flex-end;
            gap: 0.35rem;
            margin: 0 0 0 0.35rem;
        }

        .result-action-button
        {
            display: none;
            align-items: center;
            justify-content: center;
            user-select: none;
            color: var(--button-text-color);
            background-color: var(--button-color);
            width: 1.65rem;
            height: 1.45rem;
            border: 0;
            padding: 0;
            cursor: pointer;
            position: relative;
            line-height: 1;
            font: inherit;
        }

        .result-action-button:hover,
        .result-action-button:focus
        {
            color: var(--button-active-text-color);
            background: var(--button-active-color);
        }

        .result-copy.copied
        {
            border-color: var(--copy-success-background-color);
            color: var(--copy-success-text-color);
            background: var(--copy-success-background-color);
        }

        .result-copy.copy-failed
        {
            background: var(--element-background-color-fail);
        }

        #data_div.fixed, .data-div.fixed
        {
            width: fit-content;
        }

        #data-table, .data-table
        {
            width: 100%;
            border-spacing: 0;
            background-color: var(--element-background-color);
            border-collapse: collapse;
        }

        #data-table.fixed, .data-table.fixed
        {
            table-layout: fixed;
            width: var(--table-width);
         }

        /* Will be displayed when user specified custom format. */
        #data-unparsed, .data-unparsed
        {
            width: fit-content;
            background-color: var(--element-background-color);
            margin-top: 0rem;
            padding: 0.25rem 0.5rem;
            display: none;
        }

        td
        {
            background-color: var(--element-background-color);
            /* For wide tables any individual column will be no more than 50% of page width. */
            max-width: 50vw;
            /* The content is cut unless you hover. */
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border-color);
            white-space: pre;
            vertical-align: top;
        }

        td u
        {
            text-decoration-color: var(--misc-text-color);
        }

        .right
        {
            text-align: right;
        }

        th
        {
            position: sticky;
            top: -0.5rem;
            padding: 0.25rem 0.5rem;
            text-align: center;
            background-color: var(--table-header-color);
            border: 1px solid var(--border-color);
        }

        th .name {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .type-hint
        {
            display: none;
            position: absolute;
            user-select: none;
            left: 0;
            top: -1px;
            transform: translateY(-100%);
            font-size: 75%;
            font-weight: normal;
            color: var(--misc-text-color);
            background: var(--element-background-color);
            max-height: 5em;
            white-space: pre;
        }

        th:hover .type-hint
        {
            display: inline-block;
        }

        .resizer {
            position: absolute;
            top: 0;
            right: -0.3rem;
            width: 0.5rem;
            cursor: col-resize;
            user-select: none;
            height: 100%;
        }

        .resizer:hover, .resizer-dragging
        {
            border-radius: 0.25rem;
            background-color: var(--border-color-selected);
        }

        .textarea-resizer {
            position: absolute;
            bottom: -0.3rem;
            left: 0;
            width: 100%;
            height: 0.5rem;
            cursor: row-resize;
            user-select: none;
        }

        .textarea-resizer:hover, .textarea-resizer-dragging
        {
            border-radius: 0.25rem;
            background-color: var(--border-color);
        }

        #query_div {
            position: relative;
        }

        /* The row under mouse pointer is highlight for better legibility. */
        tr:hover
        {
            filter: var(--table-hover-filter);
        }

        .tr-selected
        {
            filter: var(--table-hover-filter);
        }

        #error, .error-output
        {
            background: var(--error-color);
            white-space: pre-wrap;
            padding: 0.5rem 1rem;
            display: none;
        }

        .td-selected
        {
            white-space: pre-wrap;
            max-width: none;
            outline: 2px solid var(--border-color-selected);
            outline-offset: -2px;
        }

        td.empty-result
        {
            text-align: center;
            vertical-align: middle;
        }

        .row-number
        {
            width: 1%;
            text-align: right;
            background-color: var(--table-header-color);
            color: var(--misc-text-color);
        }

        #results_workspace .data-table th,
        #results_workspace .data-table .row-number
        {
            background-color: var(--result-header-color);
        }

        div.empty-result
        {
            opacity: 10%;
            font-size: 7vw;
            font-family: Liberation Sans, DejaVu Sans, sans-serif;
        }

        @keyframes hourglass-animation {
            0% { transform: none; }
            25% { transform: rotate(180deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(360deg); }
            100% { transform: rotate(360deg); }
        }

        a, a:visited
        {
            color: var(--link-color);
            text-decoration: none;
        }

        #graph, .graph-output
        {
            display: none;
            margin: auto;
        }

        /* This is for graph in svg */
        text
        {
            font-size: 14px;
            fill: var(--text-color);
        }

        .node rect
        {
            fill: var(--element-background-color);
            filter: drop-shadow(.2rem .2rem .2rem var(--shadow-color));
            stroke: var(--border-color);
        }

        .edgePath path
        {
            stroke: var(--text-color);
        }

        marker
        {
            fill: var(--text-color);
        }

        #logo
        {
            fill: var(--logo-color);
            opacity: var(--logo-opacity);
            width: min(70vw, 56rem);
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        #logo .logo-cutout
        {
            fill: var(--background-color);
        }

        #logo .logo-underlay,
        #logo .logo-shadow
        {
            display: none;
        }

        #logo-container
        {
            grid-row: 2;
            grid-column: 1;
            text-align: center;
            margin-top: 5em;
            line-height: 0.75;
            min-width: 0;
            min-height: 0;
        }

        #chart, .chart-output
        {
            border: 1px solid var(--border-color);
            background-color: var(--element-background-color);
            filter: drop-shadow(.2rem .2rem .2rem var(--shadow-color));
            display: none;
            height: 70vh;
        }

        #url_status
        {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            user-select: none;
            color: var(--navigator-muted-color);
        }

        #url_status.ok
        {
            color: var(--element-color-ok);
        }

        #url_status.fail
        {
            color: #F66;
        }

        #server_info
        {
            color: inherit;
        }

        /* Prevents a different color when Chromium auto-fills inputs from the list. */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active
        {
            transition: background-color 600000s 0s, color 600000s 0s;
        }

        /* This is for charts (uPlot), Copyright (c) 2022 Leon Sorokin, MIT License, https://github.com/leeoniya/uPlot/ */
        .u-wrap {position: relative;user-select: none;}
        .u-over, .u-under, .u-axis {position: absolute;}
        .u-under {overflow: hidden;}
        .uplot canvas {display: block;position: relative;width: 100%;height: 100%;}
        .u-legend {font-family: Liberation Mono, DejaVu Sans Mono, MonoLisa, Consolas, monospace; border-spacing: 0; border-collapse: collapse;}
        .u-inline {display: block;}
        .u-inline * {display: inline-block;}
        .u-legend th {font-weight: 600;}
        .u-legend th > * {vertical-align: middle;display: inline-block;}
        .u-legend td { min-width: 13em; }
        .u-legend .u-marker {width: 1em;height: 1em;margin-right: 4px;background-clip: padding-box !important;}
        .u-inline.u-live th::after {content: ":";vertical-align: middle;}
        .u-inline:not(.u-live) .u-value {display: none;}
        .u-series > * {padding: 4px;}
        .u-series th {cursor: pointer;}
        .u-legend .u-off > * {opacity: 0.3;}
        .u-select {background: rgba(0,0,0,0.07);position: absolute;pointer-events: none;}
        .u-cursor-x, .u-cursor-y {position: absolute;left: 0;top: 0;pointer-events: none;will-change: transform;z-index: 100;}
        .u-hz .u-cursor-x, .u-vt .u-cursor-y {height: 100%;border-right: 1px dashed #607D8B;}
        .u-hz .u-cursor-y, .u-vt .u-cursor-x {width: 100%;border-bottom: 1px dashed #607D8B;}
        .u-cursor-pt {position: absolute;top: 0;left: 0;border-radius: 50%;border: 0 solid;pointer-events: none;will-change: transform;z-index: 100;/*this has to be !important since we set inline "background" shorthand */background-clip: padding-box !important;}
        .u-axis.u-off, .u-select.u-off, .u-cursor-x.u-off, .u-cursor-y.u-off, .u-cursor-pt.u-off {display: none;}
    </style>
</head>

                    <div class="menu-section-title">Snippets</div>

                        <button id="new-snippet-folder" class="navigator-icon-button" type="button" title="New folder">+</button>
                        <button id="save-query-snippet" class="navigator-icon-button" type="button" title="Save current query">▣</button>

                <div class="snippet-tools">
                    <input id="snippet-filter" class="snippets-filter" type="text" placeholder="filter snippets" spellcheck="false">
                    <div class="snippet-insertion-options">
                        <label class="snippet-insertion-label" for="snippet-insertion-mode">Insert mode</label>
                        <select id="snippet-insertion-mode" class="snippet-insertion-select">
                            <option value="append">Append</option>
                            <option value="insert">Insert</option>
                            <option value="overwrite">Replace</option>
                        </select>
                    </div>

                <div id="snippets-browser-empty">No saved snippets.</div>
                <div id="snippets-browser"></div>
            </div>
            <div id="history-panel" class="sidebar-panel" data-sidebar-panel="history">
                <div class="navigator-heading">
                    <div class="menu-section-title">History</div>

                        <button id="clear-history" class="navigator-icon-button" type="button" title="Clear history">×</button>

                <div id="action_history">
                    <div id="action-history-empty">No actions yet.</div>
                    <div id="action_body"></div>
                </div>
            </div>
            <div id="navigator-context-menu" class="navigator-context-menu"></div>
        </div>
        <div id="sidebar-resizer" aria-hidden="true"></div>

function buildClickHouseUrl(server_address, user, password, default_format = 'JSON', extra_params = {}) {
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?');
    const params = {
        add_http_cors_header: '1',
        default_format: default_format,
        ...extra_params
    };

    if (user) {
        params.user = user;
    }
    if (password) {
        params.password = password;
    }

    return url + Object.entries(params)
        .filter(([, value]) => value !== undefined && value !== null)
        .map(([key, value]) => `${encodeURIComponent(key)}=${encodeURIComponent(value)}`)
        .join('&');
}

    /// Browsers don't allow manipulating history for the 'file:' protocol.
    if (!opened_locally) {

        replaced_pass.delete('password');
        window.history.replaceState(null, '',
            window.location.origin + window.location.pathname + '?'
            + replaced_pass.toString() + window.location.hash);
    }
}

function createConnectionId() {
    return `connection-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
}

function createConnectionFolderId() {
    return `connection-folder-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
}

function createConnection(name) {
    return {
        id: createConnectionId(),
        name: name || `Connection ${getSavedConnections().length + 1}`,
        url: url_elem.value || 'http://localhost:8123/',
        user: user_elem.value || 'default',
        password: password_elem.value || '',
        folder_id: ''
    };
}

function normalizeConnectionStore(stored) {
    const raw_folders = stored && !Array.isArray(stored) && Array.isArray(stored.folders)
        ? stored.folders
        : [];
    const folders = [];
    const folder_ids = new Set();

    for (const folder of raw_folders) {
        if (!folder || !folder.id || !folder.name || folder_ids.has(String(folder.id))) {
            continue;
        }

        const normalized_folder = {
            id: String(folder.id),
            name: String(folder.name),
            expanded: folder.expanded !== false
        };
        folders.push(normalized_folder);
        folder_ids.add(normalized_folder.id);
    }

    const raw_connections = Array.isArray(stored)
        ? stored
        : stored && Array.isArray(stored.connections) ? stored.connections : [];
    const connections = raw_connections
        .filter(connection => connection && connection.id)
        .map(connection => {
            const folder_id = String(connection.folder_id || '');
            return {
                ...connection,
                id: String(connection.id),
                name: String(connection.name || 'Connection'),
                url: String(connection.url || 'http://localhost:8123/'),
                user: String(connection.user || 'default'),
                password: String(connection.password || ''),
                folder_id: folder_ids.has(folder_id) ? folder_id : ''
            };
        });

    return { folders: folders, connections: connections };
}

function getSavedConnectionStore() {
    try {
        return normalizeConnectionStore(JSON.parse(window.localStorage.getItem(saved_connections_key) || '[]'));
    } catch (e) {
        return { folders: [], connections: [] };
    }
}

function saveConnectionStore(store) {
    const normalized_store = normalizeConnectionStore(store);
    window.localStorage.setItem(saved_connections_key, JSON.stringify(normalized_store));
}

function getSavedConnections() {
    return getSavedConnectionStore().connections;
}

function getSavedConnectionFolders() {
    return getSavedConnectionStore().folders;
}

function saveConnections(connections) {
    const store = getSavedConnectionStore();
    store.connections = connections;
    saveConnectionStore(store);
}

function findConnectionFolderByName(name) {
    const normalized_name = name.trim().toLowerCase();
    return getSavedConnectionFolders().find(folder => folder.name.toLowerCase() == normalized_name) || null;
}

function getConnectionFolder(folder_id) {
    return getSavedConnectionFolders().find(folder => folder.id == folder_id) || null;
}

function getConnectionFolderConnections(folder_id) {
    return getSavedConnections().filter(connection => (connection.folder_id || '') == folder_id);
}

function createConnectionFolder(name, expanded = true) {
    const store = getSavedConnectionStore();
    const folder = {
        id: createConnectionFolderId(),
        name: name.trim(),
        expanded: expanded
    };
    store.folders.push(folder);
    saveConnectionStore(store);
    return folder;
}

function setConnectionFolderExpanded(folder_id, expanded) {
    const store = getSavedConnectionStore();
    for (const folder of store.folders) {
        if (folder.id == folder_id) {
            folder.expanded = !!expanded;
            break;
        }
    }
    saveConnectionStore(store);
}

function createConnectionFolderFromPrompt() {
    const folder_name = prompt('Folder name', 'New folder');
    if (folder_name === null) {
        return;
    }

    const trimmed_name = folder_name.trim();
    if (!trimmed_name) {
        alert('Folder name is required.');
        return;
    }

    if (findConnectionFolderByName(trimmed_name)) {
        alert('A folder with that name already exists.');
        return;
    }

    createConnectionFolder(trimmed_name);
    renderConnectionFolderOptions(connection_folder_select_elem.value);
    renderNavigatorTree();
}

function renameConnectionFolder(folder_id) {
    const store = getSavedConnectionStore();
    const folder = store.folders.find(candidate => candidate.id == folder_id);
    if (!folder) {
        return;
    }

    const folder_name = prompt('Folder name', folder.name);
    if (folder_name === null) {
        return;
    }

    const trimmed_name = folder_name.trim();
    if (!trimmed_name) {
        alert('Folder name is required.');
        return;
    }

    const existing_folder = findConnectionFolderByName(trimmed_name);
    if (existing_folder && existing_folder.id != folder.id) {
        alert('A folder with that name already exists.');
        return;
    }

    folder.name = trimmed_name;
    saveConnectionStore(store);
    renderConnectionFolderOptions(connection_folder_select_elem.value);
    renderNavigatorTree();
}

function deleteConnectionFolder(folder_id) {
    const store = getSavedConnectionStore();
    const folder = store.folders.find(candidate => candidate.id == folder_id);
    if (!folder) {
        return;
    }

    if (store.connections.some(connection => connection.folder_id == folder.id)) {
        alert('Move or delete the connections in this folder first.');
        return;
    }

    if (!confirm(`Delete empty folder "${folder.name}"?`)) {
        return;
    }

    store.folders = store.folders.filter(candidate => candidate.id != folder.id);
    saveConnectionStore(store);
    renderConnectionFolderOptions(connection_folder_select_elem.value);
    renderNavigatorTree();
}

function moveConnectionToFolder(connection_id, folder_id) {
    const store = getSavedConnectionStore();
    const target_folder_id = folder_id && store.folders.some(folder => folder.id == folder_id) ? folder_id : '';
    let moved_connection = null;

    for (const connection of store.connections) {
        if (connection.id == connection_id) {
            connection.folder_id = target_folder_id;
            moved_connection = connection;
            break;
        }
    }

    if (!moved_connection) {
        return;
    }

    if (target_folder_id) {
        const folder = store.folders.find(candidate => candidate.id == target_folder_id);
        if (folder) {
            folder.expanded = true;
        }
    }

    saveConnectionStore(store);
    if (current_connection_id == moved_connection.id) {
        updateNavigatorFooter(moved_connection);
        updateActiveConnectionBanner(moved_connection);
    }
    renderNavigatorTree();
}

function renderConnectionFolderOptions(selected_folder_id = '') {
    while (connection_folder_select_elem.firstChild) {
        connection_folder_select_elem.removeChild(connection_folder_select_elem.lastChild);
    }

    const top_level_option = document.createElement('option');
    top_level_option.value = '';
    top_level_option.innerText = 'Top level';
    connection_folder_select_elem.appendChild(top_level_option);

    for (const folder of getSavedConnectionFolders()) {
        const option = document.createElement('option');
        option.value = folder.id;
        option.innerText = folder.name;
        connection_folder_select_elem.appendChild(option);
    }

    connection_folder_select_elem.value = getConnectionFolder(selected_folder_id) ? selected_folder_id : '';
}

function loadNavigatorState() {
    try {
        const stored = JSON.parse(window.localStorage.getItem(navigator_state_key) || '{}');
        return {
            connections: stored && typeof stored.connections == 'object' ? stored.connections : {},
            databases: stored && typeof stored.databases == 'object' ? stored.databases : {},
            groups: stored && typeof stored.groups == 'object' ? stored.groups : {},
            // Keep table nodes collapsed on load rather than restoring prior expansion state.
            tables: {}
        };
    } catch (e) {
        return { connections: {}, databases: {}, groups: {}, tables: {} };
    }
}

function saveNavigatorState() {
    window.localStorage.setItem(navigator_state_key, JSON.stringify({
        ...navigator_state,
        tables: {}

}

function createQuerySnippetId(prefix) {

}

function loadQuerySnippets() {
    try {
        const stored = JSON.parse(window.localStorage.getItem(query_snippets_key) || '{}');
        const folders = Array.isArray(stored.folders) ? stored.folders : [];
        const snippets = Array.isArray(stored.snippets) ? stored.snippets : [];

        return {
            folders: folders
                .filter(folder => folder && folder.id && folder.name)
                .map(folder => ({
                    id: String(folder.id),
                    name: String(folder.name),
                    expanded: folder.expanded !== false
                })),
            snippets: snippets
                .filter(snippet => snippet && snippet.id && snippet.folder_id && snippet.name)
                .map(snippet => ({
                    id: String(snippet.id),
                    folder_id: String(snippet.folder_id),
                    name: String(snippet.name),
                    query: String(snippet.query || ''),
                    updated_at: String(snippet.updated_at || '')
                }))

}

function saveQuerySnippets() {

async function copyTextToClipboard(text) {
    if (navigator.clipboard && typeof navigator.clipboard.writeText == 'function') {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch (e) {
            // Fall back to a temporary textarea below.
        }
    }

    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();

    let copied = false;
    try {
        copied = document.execCommand('copy');
    } finally {
        document.body.removeChild(textarea);
    }

    return copied;
}

function getNavigatorDatabaseKey(connection_id, database_name) {
    return `${connection_id}:${database_name}`;
}

function getNavigatorGroupKey(connection_id, database_name, group_name) {
    return `${connection_id}:${database_name}:${group_name}`;
}

function getNavigatorTableKey(connection_id, database_name, table_name) {
    return `${connection_id}:${database_name}:${table_name}`;
}

function getSchemaTableKey(database_name, table_name) {
    return `${database_name}:${table_name}`;
}

function isConnectionExpanded(connection_id) {
    if (Object.prototype.hasOwnProperty.call(navigator_state.connections, connection_id)) {
        return !!navigator_state.connections[connection_id];
    }

    return connection_id == current_connection_id;
}

function setConnectionExpanded(connection_id, expanded) {
    navigator_state.connections[connection_id] = expanded;
    saveNavigatorState();
}

function isDatabaseExpanded(connection_id, database_name) {
    return !!navigator_state.databases[getNavigatorDatabaseKey(connection_id, database_name)];
}

function setDatabaseExpanded(connection_id, database_name, expanded) {
    const key = getNavigatorDatabaseKey(connection_id, database_name);
    if (expanded) {
        navigator_state.databases[key] = true;
    } else {
        delete navigator_state.databases[key];
    }
    saveNavigatorState();
}

function isSchemaGroupExpanded(connection_id, database_name, group_name) {
    const key = getNavigatorGroupKey(connection_id, database_name, group_name);
    if (Object.prototype.hasOwnProperty.call(navigator_state.groups, key)) {
        return !!navigator_state.groups[key];
    }

    return true;
}

function setSchemaGroupExpanded(connection_id, database_name, group_name, expanded) {
    const key = getNavigatorGroupKey(connection_id, database_name, group_name);
    navigator_state.groups[key] = !!expanded;
    saveNavigatorState();
}

function setAllConnectionDatabasesExpanded(connection, expanded) {
    if (!connection || schema_state.connection_id != connection.id || !schema_state.databases.length) {
        return;
    }

    for (const database_info of schema_state.databases) {
        const key = getNavigatorDatabaseKey(connection.id, database_info.database);
        if (expanded) {
            navigator_state.databases[key] = true;
        } else {
            delete navigator_state.databases[key];
        }
    }
    saveNavigatorState();
    renderNavigatorTree();

    if (expanded) {
        for (const database_info of schema_state.databases) {
            if (!schema_state.tables[database_info.database] && !schema_state.loading_tables[database_info.database]) {
                loadTables(connection.url, connection.user, connection.password, database_info.database);
            }
        }
    }
}

function isTableExpanded(connection_id, database_name, table_name) {
    return !!navigator_state.tables[getNavigatorTableKey(connection_id, database_name, table_name)];
}

function setTablesExpanded(connection_id, database_name, table_names, expanded) {
    for (const table_name of table_names) {
        const key = getNavigatorTableKey(connection_id, database_name, table_name);
        if (expanded) {
            navigator_state.tables[key] = true;
        } else {
            delete navigator_state.tables[key];
        }
    }
    saveNavigatorState();
}

function matchesSchemaFilter(database_name, filter) {
    if (!filter) {
        return true;
    }

    if (database_name.toLowerCase().includes(filter)) {
        return true;
    }

    const cached_tables = schema_state.tables[database_name] || [];
    return cached_tables.some(elem => `${database_name}.${elem.table}`.toLowerCase().includes(filter));
}

function formatConnectionSummary(connection) {
    const raw_url = (connection.url || '').trim();
    const without_protocol = raw_url.replace(/^[a-z]+:\/\//i, '').replace(/\/$/, '');
    const compact_url = without_protocol || raw_url || 'server';
    return connection.user && connection.user != 'default'
        ? `${connection.user}@${compact_url}`
        : compact_url;
}

function getConnectionHostParts(raw_url) {
    const raw = (raw_url || '').trim();
    if (!raw) {
        return { host: '', port: '' };
    }

    try {
        const parsed = new URL(raw);
        return { host: parsed.hostname.replace(/^\[|\]$/g, ''), port: parsed.port };
    } catch (e) {
        const authority = raw
            .replace(/^[a-z]+:\/\//i, '')
            .split('/')[0]
            .split('@')
            .pop();
        const ipv6_match = authority.match(/^\[([^\]]+)\](?::(\d+))?$/);
        if (ipv6_match) {
            return { host: ipv6_match[1], port: ipv6_match[2] || '' };
        }

        const host_port_match = authority.match(/^([^:]+)(?::(\d+))?$/);
        return {
            host: host_port_match ? host_port_match[1] : authority,
            port: host_port_match ? host_port_match[2] || '' : ''
        };
    }
}

function normaliseConnectionHostName(value) {
    const parts = getConnectionHostParts(value);
    return (parts.host || String(value || '').trim()).toLowerCase().replace(/\.$/, '');
}

function formatConnectionHeaderSummary(connection) {
    if (connection.user && connection.user != 'default') {
        return formatConnectionSummary(connection);
    }

    const url_parts = getConnectionHostParts(connection.url);
    const connection_name = normaliseConnectionHostName(connection.name);
    const connection_host = normaliseConnectionHostName(connection.url);
    if (connection_name && connection_host && connection_name == connection_host) {
        return url_parts.port ? `:${url_parts.port}` : '';
    }

    return formatConnectionSummary(connection);
}

function formatConnectionDisplayLabel(connection) {
    const summary = formatConnectionHeaderSummary(connection);
    if (!summary) {
        return connection.name || 'Connection';
    }

    const separator = summary.startsWith(':') ? ' ' : ' · ';
    return `${connection.name || 'Connection'}${separator}${summary}`;
}

function isMaterializedViewEngine(engine) {
    return /materialized\s+view/i.test(engine || '');
}

function isViewEngine(engine) {
    return /view/i.test(engine || '');
}

function isDictionaryEngine(engine) {
    return /^Dictionary$/i.test((engine || '').trim());
}

function isReplicatedTableEngine(engine) {
    return /^Replicated/i.test(engine || '') && !isViewEngine(engine);
}

function getSchemaItemKind(engine) {
    if (isDictionaryEngine(engine)) {
        return 'dictionary';
    }

    if (isMaterializedViewEngine(engine)) {
        return 'materialized-view';
    }

    return isViewEngine(engine) ? 'view' : 'table';
}

function getSchemaItemIcon(kind) {
    switch (kind) {
        case 'materialized-view':
            return '◳';
        case 'dictionary':
            return '▧';
        case 'view':
            return '◰';
        case 'table':
        default:
            return '▤';
    }
}

function getConnectionDashboardUrl(connection) {
    const raw_url = (connection?.url || '').trim();
    if (!raw_url) {
        return '';
    }

    const user = (connection?.user || '').trim();
    try {
        const dashboard_url = new URL('/dashboard', new URL(raw_url));
        if (user) {
            dashboard_url.searchParams.set('user', user);
        }
        return dashboard_url.toString();
    } catch (e) {
        const trimmed = raw_url.replace(/\/+$/, '').replace(/\/play$/i, '');
        if (!trimmed) {
            return '';
        }

        const dashboard_url = `${trimmed}/dashboard`;
        return user ? `${dashboard_url}?user=${encodeURIComponent(user)}` : dashboard_url;
    }
}

function copyConnectionPasswordToClipboard(connection) {
    const password = connection?.password || '';
    if (!password || !navigator.clipboard || typeof navigator.clipboard.writeText != 'function') {
        return;
    }

    try {
        navigator.clipboard.writeText(password).catch(() => {});
    } catch (e) {
        // Clipboard access can fail on non-secure origins.
    }
}

function openConnectionDashboard(connection) {
    const dashboard_url = getConnectionDashboardUrl(connection);
    if (!dashboard_url) {
        return;
    }

    copyConnectionPasswordToClipboard(connection);
    window.open(dashboard_url, '_blank', 'noopener');
}

function buildSelectStatement(database, table, columns) {
    if (!columns.length) {
        return `SELECT * FROM ${database}.${table} LIMIT 100;`;
    }

    const column_lines = columns.map((column, index) =>
        `    ${column.name}${index < columns.length - 1 ? ',' : ''}`);

    return `SELECT
${column_lines.join('\n')}
FROM ${database}.${table}
LIMIT 100;`;
}

function buildReadableCountStatement(database, table) {
    return `SELECT formatReadableQuantity(count(*)) AS readable_count FROM ${database}.${table};`;
}

function buildColumnStatsStatement(database, table, column) {
    return `SELECT
    quantile(0.50)(${column}) AS p50_${column},
    quantile(0.95)(${column}) AS p95_${column},
    quantile(0.99)(${column}) AS p99_${column},
    min(${column}) AS min_${column},
    avg(${column}) AS avg_${column},
    max(${column}) AS max_${column}
FROM ${database}.${table};`;
}

function getClickHouseBaseType(type) {
    let base_type = (type || '').trim();
    let previous_type = '';

    while (base_type && base_type != previous_type) {
        previous_type = base_type;
        const wrapper_match = base_type.match(/^(Nullable|LowCardinality)\((.*)\)$/i);
        if (wrapper_match) {
            base_type = wrapper_match[2].trim();
        }
    }

    return base_type;
}

function isNumericClickHouseType(type) {
    const base_type = getClickHouseBaseType(type);
    return /^(U?Int(8|16|32|64|128|256)|Float(32|64)|BFloat16)\b/i.test(base_type)
        || /^Decimal(32|64|128|256)?\s*\(/i.test(base_type);
}

function buildDropStatement(database, table, engine) {
    if (isDictionaryEngine(engine)) {
        return `DROP DICTIONARY ${database}.${table};`;
    }

    if (isViewEngine(engine)) {
        return `DROP VIEW ${database}.${table};`;
    }

    const cluster_clause = isReplicatedTableEngine(engine) ? ` ON CLUSTER '{cluster}' SYNC` : '';
    return `DROP TABLE ${database}.${table}${cluster_clause};`;
}

function buildDropDictionaryOnClusterStatement(database, table) {
    return `DROP DICTIONARY ${database}.${table} ON CLUSTER '{cluster}' SYNC;`;
}

function createNavigatorLabel(icon, text, icon_class = '') {
    const label = document.createElement('span');
    label.className = 'navigator-inline-label';

    if (icon !== '')
    {
        const icon_elem = document.createElement('span');
        icon_elem.className = `navigator-node-icon ${icon_class}`.trim();
        icon_elem.innerText = icon;
        icon_elem.setAttribute('aria-hidden', 'true');
        label.appendChild(icon_elem);
    }

    const text_elem = document.createElement('span');
    text_elem.className = 'navigator-inline-text';
    text_elem.innerText = text;


    label.appendChild(text_elem);
    return label;
}

function normaliseInsertionMode(mode, fallback = 'append') {
    return ['append', 'insert', 'overwrite'].includes(mode) ? mode : fallback;
}

function rememberQueryEditorSelection() {
    const value_length = query_area.value.length;
    const start = Math.max(0, Math.min(query_area.selectionStart ?? value_length, value_length));
    const end = Math.max(0, Math.min(query_area.selectionEnd ?? start, value_length));
    insertion_manager.last_selection_start = start;
    insertion_manager.last_selection_end = end;
}

function getRememberedQueryEditorSelection() {
    const value_length = query_area.value.length;
    return {
        start: Math.max(0, Math.min(insertion_manager.last_selection_start, value_length)),
        end: Math.max(0, Math.min(insertion_manager.last_selection_end, value_length))
    };
}

function replaceQueryEditorRange(text, start = query_area.selectionStart ?? query_area.value.length, end = query_area.selectionEnd ?? query_area.value.length, selection_start = null, selection_end = null) {
    query_area.focus();
    query_area.setSelectionRange(start, end);

    let inserted = false;
    const value_before_insert = query_area.value;
    if (typeof document.execCommand == 'function') {
        try {
            inserted = document.execCommand('insertText', false, text);
        } catch (e) {
            inserted = false;
        }
    }

    if (!inserted && query_area.value != value_before_insert) {
        inserted = true;
    }

    if (!inserted) {
        query_area.setRangeText(text, start, end, 'end');
    }

    if (selection_start !== null && selection_end !== null) {
        query_area.setSelectionRange(selection_start, selection_end);
    }

    rememberQueryEditorSelection();
    updateRunButtonText();
}

function insertIntoQueryEditor(text, options = {}) {
    const mode = normaliseInsertionMode(options.mode);
    const value_length = query_area.value.length;
    let start = value_length;
    let end = value_length;
    let text_to_insert = text;

    if (mode == 'append') {
        text_to_insert = `${query_area.value.trim() ? '\n\n' : ''}${text}`;
    } else if (mode == 'overwrite') {
        start = 0;
        end = value_length;
    } else {
        const selection = document.activeElement == query_area
            ? {
                start: query_area.selectionStart ?? value_length,
                end: query_area.selectionEnd ?? query_area.selectionStart ?? value_length
            }
            : getRememberedQueryEditorSelection();
        start = selection.start;
        end = selection.end;
    }

    replaceQueryEditorRange(text_to_insert, start, end);
}

function formatClickHouseIdentifier(name) {
    const identifier = String(name || '');
    return /^[A-Za-z_][A-Za-z0-9_]*$/.test(identifier)
        ? identifier
        : `\`${identifier.replace(/`/g, '``')}\``;
}

function formatQualifiedIdentifier(database, name) {
    return `${formatClickHouseIdentifier(database)}.${formatClickHouseIdentifier(name)}`;
}

function getTableQueryLogQuery(database, table) {
    return `SELECT
    event_time,
    user,
    query_duration_ms,
    read_rows,
    read_bytes,
    result_rows,
    memory_usage,
    query
FROM system.query_log
WHERE type = 'QueryFinish'
  AND (
      query ILIKE '%"${database}"."${table}"%'
      OR query ILIKE '%${database}.${table}%'
  )
ORDER BY event_time DESC
LIMIT 100`;
}

async function fetchTableColumns(server_address, user, password, database, table) {
    let url = server_address +
        (server_address.indexOf('?') >= 0 ? '&' : '?') +
        'add_http_cors_header=1&default_format=JSON';
    if (user) url += '&user=' + encodeURIComponent(user);
    if (password) url += '&password=' + encodeURIComponent(password);
    url += '&param_database=' + encodeURIComponent(database);
    url += '&param_table=' + encodeURIComponent(table);

    let response = await fetch(url, {
        method: "POST",
        body: `SELECT name, type
            FROM system.columns
            WHERE database = {database:String} AND table = {table:String}
            ORDER BY position`,
        headers: { 'Authorization': 'never' } });
    if (!response.ok) {
        return false;
    }

    const json = await response.json();
    return json.data || [];
}

function buildInsertStatement(database, table, columns) {
    if (!columns.length) {
        return `INSERT INTO ${database}.${table}\nVALUES\n(\n    \n);`;
    }

    const column_lines = columns.map((column, index) =>
        `    ${column.name}${index < columns.length - 1 ? ',' : ''}`);
    const value_lines = columns.map((column, index) =>
        `    /* ${column.name} */${index < columns.length - 1 ? ',' : ''}`);

    return `INSERT INTO ${database}.${table}\n(\n${column_lines.join('\n')}\n)\nVALUES\n(\n${value_lines.join('\n')}\n);`;
}

function hideNavigatorContextMenu() {
    navigator_context_menu_elem.classList.remove('open');
    navigator_context_menu_elem.innerHTML = '';

function showNavigatorContextMenu(items, x, y) {
    navigator_context_menu_elem.innerHTML = '';

    for (const item of items) {
        const button = document.createElement('button');
        button.type = 'button';
        button.disabled = !!item.disabled;

        const icon = document.createElement('span');
        icon.className = 'navigator-menu-icon';
        icon.innerText = item.icon || '•';

        const label = document.createElement('span');
        label.className = 'navigator-menu-label';
        label.innerText = item.label;

        button.appendChild(icon);
        button.appendChild(label);
        button.addEventListener('click', e => {
            e.stopPropagation();
            hideNavigatorContextMenu();
            if (!item.disabled) {
                item.onClick();
            }
        });
        navigator_context_menu_elem.appendChild(button);
    }

    navigator_context_menu_elem.classList.add('open');
    navigator_context_menu_elem.style.left = `${x}px`;
    navigator_context_menu_elem.style.top = `${y}px`;

    const rect = navigator_context_menu_elem.getBoundingClientRect();
    const next_left = Math.min(x, Math.max(8, window.innerWidth - rect.width - 8));
    const next_top = Math.min(y, Math.max(8, window.innerHeight - rect.height - 8));
    navigator_context_menu_elem.style.left = `${next_left}px`;
    navigator_context_menu_elem.style.top = `${next_top}px`;
}

function deleteConnectionById(connection_id) {
    let connections = getSavedConnections();
    if (connections.length <= 1) {
        return;

    connections = connections.filter(connection => connection.id != connection_id);
    saveConnections(connections);

    if (current_connection_id == connection_id) {
        closeConnectionEditor();
        applyConnection(connections[0]);
    } else {
        renderNavigatorTree();
    }
}

function saveConnectionRecord(nextConnection) {
    let connections = getSavedConnections();
    let updated = false;
    connections = connections.map(connection => {
        if (connection.id == nextConnection.id) {
            updated = true;
            return nextConnection;
        }
        return connection;
    });

    if (!updated) {
        connections.push(nextConnection);
    }

    saveConnections(connections);
    applyConnection(nextConnection);
}

function snippetMatchesFilter(snippet, filter) {
    if (!filter) {
        return true;
    }

    return `${snippet.name} ${snippet.query}`.toLowerCase().includes(filter);
}

function renderSnippets() {
    const filter = snippet_filter_elem.value.trim().toLowerCase();
    hideNavigatorContextMenu();
    snippets_browser_elem.innerHTML = '';

    if (!query_snippets_state.folders.length) {
        snippets_browser_empty_elem.style.display = 'block';
        snippets_browser_empty_elem.innerText = filter ? 'No snippets matched the current filter.' : 'No saved snippets.';
        return;
    }

    for (const folder of query_snippets_state.folders) {
        const folder_snippets = getSnippetFolderSnippets(folder.id);
        const folder_matches = filter && folder.name.toLowerCase().includes(filter);
        const visible_snippets = folder_matches
            ? folder_snippets
            : folder_snippets.filter(snippet => snippetMatchesFilter(snippet, filter));

        if (filter && !folder_matches && !visible_snippets.length) {
            continue;
        }

        const folder_elem = document.createElement('div');
        folder_elem.className = 'snippet-folder';
        const expanded = filter ? true : folder.expanded !== false;
        if (!expanded) {
            folder_elem.classList.add('collapsed');
        }

        const header = document.createElement('div');
        header.className = 'snippet-folder-header';
        header.addEventListener('contextmenu', e => {
            e.preventDefault();
            openSnippetFolderMenu(folder, { left: e.clientX, bottom: e.clientY });
        });

        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'navigator-toggle';
        toggle.innerText = expanded ? '▾' : '▸';
        toggle.addEventListener('click', e => {
            e.stopPropagation();
            toggleSnippetFolder(folder.id);
        });

        const title = document.createElement('button');
        title.type = 'button';
        title.className = 'snippet-folder-title';
        title.innerText = folder.name;
        title.title = folder.name;
        title.addEventListener('click', () => toggleSnippetFolder(folder.id));

        const actions = document.createElement('div');
        actions.className = 'snippet-folder-actions';

        const save_here_button = document.createElement('button');
        save_here_button.type = 'button';
        save_here_button.className = 'snippet-folder-action';
        save_here_button.innerText = '+';
        save_here_button.title = 'Save current query here';
        save_here_button.addEventListener('click', e => {
            e.stopPropagation();
            saveCurrentQueryAsSnippet(folder);
        });

        const menu_button = document.createElement('button');
        menu_button.type = 'button';
        menu_button.className = 'snippet-folder-action';
        menu_button.innerText = '⋮';
        menu_button.title = 'Folder actions';
        menu_button.addEventListener('click', e => {
            e.stopPropagation();
            openSnippetFolderMenu(folder, menu_button.getBoundingClientRect());
        });

        actions.appendChild(save_here_button);
        actions.appendChild(menu_button);

        header.appendChild(toggle);
        header.appendChild(title);
        header.appendChild(actions);
        folder_elem.appendChild(header);

        const children = document.createElement('div');
        children.className = 'snippet-folder-children';

        if (visible_snippets.length) {
            for (const snippet of visible_snippets) {
                const row = document.createElement('div');
                row.className = 'snippet-row';
                row.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    openSnippetMenu(snippet, { left: e.clientX, bottom: e.clientY });
                });

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'snippet-button';
                button.title = snippet.query;
                button.addEventListener('click', () => insertIntoQueryEditor(snippet.query, { mode: getSnippetInsertionMode() }));

                const name = document.createElement('span');
                name.className = 'snippet-name';
                name.innerText = snippet.name;

                const preview = document.createElement('span');
                preview.className = 'snippet-preview monospace';
                preview.innerText = formatSnippetPreview(snippet.query);

                button.appendChild(name);
                button.appendChild(preview);

                const row_actions = document.createElement('div');
                row_actions.className = 'snippet-row-actions';

                const row_menu = document.createElement('button');
                row_menu.type = 'button';
                row_menu.className = 'snippet-row-action';
                row_menu.innerText = '⋮';
                row_menu.title = 'Snippet actions';
                row_menu.addEventListener('click', e => {
                    e.stopPropagation();
                    openSnippetMenu(snippet, row_menu.getBoundingClientRect());
                });

                row_actions.appendChild(row_menu);
                row.appendChild(button);
                row.appendChild(row_actions);
                children.appendChild(row);
            }
        } else {
            children.appendChild(createNavigatorStatus(filter ? 'No snippets matched this folder.' : 'No snippets in this folder.'));
        }

        folder_elem.appendChild(children);
        snippets_browser_elem.appendChild(folder_elem);
    }

    snippets_browser_empty_elem.style.display = snippets_browser_elem.firstChild ? 'none' : 'block';
    if (!snippets_browser_elem.firstChild) {
        snippets_browser_empty_elem.innerText = 'No snippets matched the current filter.';
    }
}
